<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:300px; height:380px;
  font-family: -apple-system,'Helvetica Neue',Arial,sans-serif;
  background: #13091f; color: #e8deff;
  overflow: hidden; border-radius: 16px;
}
#header {
  padding: 12px 14px 10px;
  background: linear-gradient(135deg,#2a1245,#13091f);
  border-bottom: 1px solid rgba(150,100,255,0.2);
  display: flex; align-items: center; justify-content: space-between;
}
#header-left { display:flex; align-items:center; gap:8px; }
#pet-emoji { font-size:20px; }
#pet-name { font-size:13px; font-weight:600; color:#e0d0ff; }
#status { font-size:10px; color:rgba(180,150,255,0.5); margin-top:1px; }
#close-btn {
  width:22px; height:22px; border-radius:50%;
  background:rgba(255,80,80,0.15); border:1px solid rgba(255,80,80,0.3);
  color:#ff8080; font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#close-btn:hover { background:rgba(255,80,80,0.35); }
#messages {
  height:250px; overflow-y:auto;
  padding:10px 12px; display:flex; flex-direction:column; gap:8px;
}
#messages::-webkit-scrollbar { width:4px; }
#messages::-webkit-scrollbar-thumb { background:rgba(130,100,255,0.3); border-radius:2px; }
.msg { display:flex; flex-direction:column; max-width:85%; }
.msg.user { align-self:flex-end; align-items:flex-end; }
.msg.pet  { align-self:flex-start; align-items:flex-start; }
.msg-bubble { padding:7px 11px; border-radius:14px; font-size:12px; line-height:1.5; }
.msg.user .msg-bubble { background:rgba(120,80,220,0.35); border:1px solid rgba(130,90,255,0.3); color:#e8deff; }
.msg.pet .msg-bubble  { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); color:#f0e8ff; }
.msg-time { font-size:9px; color:rgba(180,150,255,0.35); margin-top:2px; padding:0 4px; }
.msg-actions { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
.action-pill {
  font-size:9px; padding:2px 7px; border-radius:8px;
  background:rgba(120,80,220,0.2); border:1px solid rgba(130,90,255,0.25);
  color:rgba(180,150,255,0.7);
}
.thinking { display:flex; align-items:center; gap:4px; padding:8px 12px; }
.dot { width:6px; height:6px; border-radius:50%; background:#a78bfa; animation:pulse 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
#input-area {
  padding:8px 10px; border-top:1px solid rgba(150,100,255,0.15);
  display:flex; gap:6px; align-items:flex-end;
}
#msg-input {
  flex:1; background:rgba(255,255,255,0.06);
  border:1px solid rgba(150,100,255,0.25); border-radius:10px;
  padding:7px 10px; color:#e8deff; font-size:12px;
  font-family:inherit; resize:none; min-height:34px; max-height:80px;
  outline:none; line-height:1.4;
}
#msg-input:focus { border-color:rgba(150,100,255,0.55); }
#msg-input::placeholder { color:rgba(180,150,255,0.35); }
#send-btn {
  width:34px; height:34px; border-radius:10px; flex-shrink:0;
  background:rgba(120,80,220,0.35); border:1px solid rgba(130,90,255,0.4);
  color:#c4b0ff; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#send-btn:hover { background:rgba(120,80,220,0.6); }
#send-btn:disabled { opacity:0.4; cursor:default; }
</style>
</head>
<body>
<div id="header">
  <div id="header-left">
    <span id="pet-emoji">🐈</span>
    <div><div id="pet-name">Cat</div><div id="status">ready to chat</div></div>
  </div>
  <div id="close-btn" onclick="window.close()">✕</div>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="msg-input" placeholder="Say something..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">↑</button>
</div>

<script>
const { ipcRenderer } = require('electron');
const { AI_MODEL, buildSystemPrompt, parseResponse } = require('./pet-ai');

const PETS = {
  cat:        { emoji:'🐈', name:'Cat' },
  dog:        { emoji:'🐕', name:'Dog' },
  lizard:     { emoji:'🦎', name:'Lizard' },
  snake:      { emoji:'🐍', name:'Snake' },
  unicorn:    { emoji:'🦄', name:'Unicorn' },
  jigglypuff: { emoji:'🎤', name:'Jigglypuff' },
  pikachu:    { emoji:'⚡', name:'Pikachu' },
};

let currentPet = 'cat';
let isThinking = false;
let thinkingEl = null;
let aiEnabled = true;

ipcRenderer.on('set-pet', (e, pet) => {
  currentPet = pet;
  const p = PETS[pet] || PETS.cat;
  document.getElementById('pet-emoji').textContent = p.emoji;
  document.getElementById('pet-name').textContent = p.name;
});

ipcRenderer.on('auto-message', (e, { text, actions }) => {
  addMessage('pet', text, actions || []);
});
ipcRenderer.on('ai-enabled-changed', (e, enabled) => {
  aiEnabled = !!enabled;
  document.getElementById('status').textContent = aiEnabled ? 'ready to chat' : 'AI is off';
});

function timeStr() {
  return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function addMessage(role, text, actions=[]) {
  const msgs = document.getElementById('messages');
  const p = PETS[currentPet] || PETS.cat;
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const actionPills = role === 'pet' && actions.length
    ? `<div class="msg-actions">${actions.map(a => `<span class="action-pill">▶ ${a.replace(/_/g,' ')}</span>`).join('')}</div>`
    : '';
  div.innerHTML = `
    <div class="msg-bubble">${text}</div>
    ${actionPills}
    <div class="msg-time">${role === 'pet' ? p.emoji + ' ' : ''}${timeStr()}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  const msgs = document.getElementById('messages');
  thinkingEl = document.createElement('div');
  thinkingEl.className = 'msg pet';
  thinkingEl.innerHTML = `<div class="msg-bubble"><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(thinkingEl);
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('status').textContent = 'thinking...';
}

function hideThinking() {
  if (thinkingEl) {
    thinkingEl.remove();
    thinkingEl = null;
  }
  document.getElementById('status').textContent = 'ready to chat';
}

async function askOllama(userMsg) {
  const response = await fetch('http://localhost:11434/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: AI_MODEL,
      system: buildSystemPrompt(currentPet),
      prompt: userMsg,
      stream: false,
      options: { temperature: 0.55, num_predict: 120 }
    })
  });
  if (!response.ok) throw new Error(`Ollama error: ${response.status}`);
  const data = await response.json();
  return data.response || '{}';
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isThinking) return;
  if (!aiEnabled) {
    addMessage('pet', '*AI is turned off in Settings or the tray menu.*', []);
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  isThinking = true;
  document.getElementById('send-btn').disabled = true;
  showThinking();
  ipcRenderer.send('pet-thinking', true);

  try {
    const raw = await askOllama(text);
    const parsed = parseResponse(currentPet, raw);
    hideThinking();
    addMessage('pet', parsed.text, parsed.actions);
    ipcRenderer.send('pet-response', parsed);
  } catch (err) {
    hideThinking();
    const errMsg = err.message.includes('Failed to fetch')
      ? '*(Ollama not running — start it with: ollama serve)*'
      : `*error: ${err.message}*`;
    addMessage('pet', errMsg, ['sad_droop']);
    ipcRenderer.send('pet-response', { text: errMsg, emotion: 'sad', actions: ['sad_droop'] });
  }

  isThinking = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});
</script>
</body>
</html>
