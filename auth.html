<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:360px;height:260px;
  background:#0a0806;
  font-family:Georgia,'Times New Roman',serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:0;color:#c8a060;
  user-select:none; overflow:hidden;
}
.title{font-size:1.8rem;font-style:italic;margin-bottom:3px;color:#e8d0a0;}
.sub{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
     color:#5a4838;margin-bottom:8px;}
.desc{font-size:.68rem;color:#5a4838;margin-bottom:20px;text-align:center;}
input{
  width:260px;padding:10px 14px;
  background:#1a1610;border:1px solid #4a3a28;
  border-radius:3px;color:#e8dcc8;font-size:.9rem;
  outline:none;margin-bottom:8px;text-align:center;
  letter-spacing:1px;font-family:Georgia,serif;
}
input:focus{border-color:#8b6030;}
button{
  width:260px;padding:9px;
  background:linear-gradient(135deg,#6b3a1f,#3d1f08);
  border:none;border-radius:3px;color:#f0d9b5;
  font-size:.82rem;cursor:pointer;font-family:Georgia,serif;
  transition:opacity .15s;
}
button:hover{opacity:.85;}
button:disabled{opacity:.45;cursor:default;}
#msg{margin-top:9px;font-size:.72rem;min-height:16px;color:#c05050;text-align:center;}
#spinner{display:none;font-size:.72rem;color:#8b6030;margin-top:9px;}
</style>
</head>
<body>
<div class="title">Desktop Pets</div>
<div class="sub">Licensed Edition</div>
<div class="desc">Enter your license key to activate this device</div>
<input type="password" id="pk" placeholder="License key" autocomplete="off"/>
<button id="pb">Activate Device ›</button>
<div id="msg"></div>
<div id="spinner">Activating…</div>
<script>
const {ipcRenderer}=require('electron');
const pw=document.getElementById('pk');
const btn=document.getElementById('pb');
const msg=document.getElementById('msg');
const spin=document.getElementById('spinner');

setTimeout(()=>pw.focus(),60);

async function go(){
  const v=pw.value.trim();
  if(!v) return;
  btn.disabled=true; msg.textContent=''; spin.style.display='block';
  const res=await ipcRenderer.invoke('activate-key',v);
  spin.style.display='none';
  if(res.ok){
    msg.style.color='#60a060';
    msg.textContent='Activated! Starting…';
    setTimeout(()=>ipcRenderer.send('auth-success'),800);
  } else {
    msg.style.color='#c05050';
    msg.textContent=res.msg;
    pw.value=''; pw.focus();
    btn.disabled=false;
  }
}

btn.addEventListener('click',go);
pw.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();go();}});

ipcRenderer.on('auth-failed',(_,m)=>{
  spin.style.display='none';
  msg.style.color='#c05050';
  msg.textContent=m||'Activation failed.';
  pw.value=''; pw.focus(); btn.disabled=false;
});
</script>
</body>
</html>
