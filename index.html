<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 220px;
            height: 220px;
            background: transparent;
            overflow: hidden;
            user-select: none;
        }

        #stage {
            width: 220px;
            height: 220px;
            position: relative;
            cursor: default;
        }

        #pet-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 220px;
            height: 220px;
        }

        #bubble {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.96);
            color: #1a0a40;
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            border: 1px solid rgba(100, 100, 255, 0.3);
            z-index: 20;
            max-width: 210px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #bubble.person-bubble {
            top: 72px;
        }

        #bubble.show {
            opacity: 1;
        }

        /* Settings hint tooltip */
        #hint {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.55);
            color: rgba(255, 255, 255, 0.7);
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        #stage:hover #hint {
            opacity: 1;
        }

        #mood-popup {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 210px;
            background: rgba(18, 18, 24, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 6px 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
            z-index: 25;
        }

        #mood-popup.show {
            display: flex;
        }

        #mood-text {
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            line-height: 1.2;
        }

        #mood-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }

        .mood-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            line-height: 1;
            padding: 4px 0;
            cursor: pointer;
        }

        .mood-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div id="stage">
        <canvas id="pet-canvas" width="220" height="220"></canvas>
        <div id="bubble"></div>
        <div id="mood-popup">
            <div id="mood-text"></div>
            <div id="mood-options">
                <button class="mood-btn" data-emoji="😡">😡</button>
                <button class="mood-btn" data-emoji="😢">😢</button>
                <button class="mood-btn" data-emoji="😐">😐</button>
                <button class="mood-btn" data-emoji="😏">😏</button>
                <button class="mood-btn" data-emoji="😎">😎</button>
            </div>
        </div>
        <div id="hint">
            double-click / S = settings · right-click = settings · drag =
            move · G = mini-game
        </div>
    </div>
    <script>
        const { ipcRenderer } = require("electron");
        const fs = require("fs");
        const path = require("path");

        // Safe directory resolution for Renderer process
        const APP_ROOT = process.cwd();

        function toDataURI(fileName) {
            try {
                const filePath = path.join(APP_ROOT, fileName);
                const bitmap = fs.readFileSync(filePath);
                return `data:image/png;base64,${bitmap.toString("base64")}`;
            } catch (e) {
                console.error("Failed to load image as Data URI:", fileName, e);
                return "";
            }
        }

        // Initialization Wrapper to prevent crashes from stopping the whole script
        let personImages = [new Image(), new Image()];
        try {
            const {
                AI_MODEL,
                buildSystemPrompt,
                parseResponse,
            } = require("./pet-ai");
            personImages[0].src = toDataURI("person_1.png");
            personImages[1].src = toDataURI("person_2.png");
        } catch (err) {
            console.error("Initialization error:", err);
        }

        // Version Label for troubleshooting
        console.log("Desktop Pets Renderer V2 Active");

        const canvas = document.getElementById("pet-canvas");
        const C = canvas.getContext("2d");
        const bubbleEl = document.getElementById("bubble");
        const moodPopupEl = document.getElementById("mood-popup");
        const moodTextEl = document.getElementById("mood-text");
        const moodButtons = Array.from(
            document.querySelectorAll(".mood-btn"),
        );
        const PET_WINDOW_WIDTH = 220;
        const PET_WINDOW_HEIGHT = 220;
        const PET_ANCHOR_X = 110;
        const PET_ANCHOR_Y = 130;
        const FLOOR_MARGIN = 36;

        function clampPetWindow(x, y) {
            return {
                x: Math.max(-PET_ANCHOR_X, Math.min(sw - PET_ANCHOR_X, x)),
                y: Math.max(-PET_ANCHOR_Y, Math.min(sh - PET_ANCHOR_Y, y)),
            };
        }

        function petCenterX() {
            return wx + PET_ANCHOR_X;
        }
        function petCenterY() {
            return wy + PET_ANCHOR_Y;
        }
        function screenFloorY() {
            return Math.max(80, sh - FLOOR_MARGIN);
        }

        // ═══════════════════════════════════════════
        // SCREEN INFO
        // ═══════════════════════════════════════════
        let sw = 1440,
            sh = 900,
            wx = 700,
            wy = 680;
        async function refreshScreen() {
            const i = await ipcRenderer.invoke("get-screen-info");
            sw = i.sw;
            sh = i.sh;
            wx = i.wx;
            wy = i.wy;
        }
        refreshScreen();
        setInterval(refreshScreen, 1500);
        function moveWin(x, y) {
            const next = clampPetWindow(x, y);
            wx = next.x;
            wy = next.y;
            ipcRenderer.send("set-win-pos", { x: wx, y: wy });
        }

        // Send effects data to fullscreen overlay window
        // Converts canvas-local coords to screen coords
        function sendOverlay(gamePayload) {
            const resolvedGame =
                gamePayload !== undefined ? gamePayload : Game.overlayPayload;
            const hasGame =
                resolvedGame && Object.keys(resolvedGame).length > 0;
            // Convert scribble pts from canvas-local to screen coords
            // Scribble pts are already in screen coords (built with wx+110 offset)
            const screenScribbles = scribbles;
            // Lightning: canvas-local x + wx, segs same
            const screenLightnings = lightnings.map((l) => ({
                ...l,
                x: l.x + wx,
                segs: l.segs
                    ? l.segs.map((s) => ({ x: s.x + wx, y: s.y + wy }))
                    : [],
            }));
            // Rainbow puke: canvas-local → screen
            const screenRainbow = rainbowPuke.map((p) => ({
                ...p,
                x: p.x + wx,
                y: p.y + wy,
            }));
            const worldEffects = {
                pixelMouse,
                mug,
                bone,
                cupcake,
                ketchup,
                yarnBalls,
                bugs,
                humans,
                musicNotes,
                game: hasGame ? resolvedGame : null,
            };
            ipcRenderer.send("overlay-draw", {
                scribbles: screenScribbles,
                lightnings: screenLightnings,
                rainbowPuke: screenRainbow,
                scratchMarks,
                worldEffects,
            });
        }
        function clearOverlay() {
            sendOverlay({}); // Clear by sending empty game payload
        }

        // ===== Mini-Game Manager =====
        const GAME_TYPES = [
            "cat",
            "dog",
            "lizard",
            "snake",
            "unicorn",
            "jigglypuff",
            "pikachu",
            "person",
        ];

        const Game = {
            active: null,
            state: {},
            lastTick: performance.now(),
            overlayPayload: {},
            pointer: { x: sw * 0.5, y: sh * 0.6, down: false },
        };

        function startMiniGame(pet = currentPet) {
            if (!GAME_TYPES.includes(pet)) pet = "cat";
            M.inGame = true;
            M.gameScore = 0;
            M.gameTimer = 60;
            Game.active = pet;
            Game.state = {};
            Game.state.pointerWasDown = false;
            Game.lastTick = performance.now();
            initGameForPet(pet);
            showBubble("Mini‑game started!");
        }

        function endMiniGame(won = false) {
            if (!M.inGame) return;
            const previous = Game.active;
            M.inGame = false;
            if (won) rewardAffection(6 + Math.floor(M.gameScore / 5));
            showBubble(won ? "You win!" : "Game over");
            Game.active = null;
            Game.state = {};
            Game.overlayPayload = {};
            M.snakeSegs = 18;
            showMoodPopup(false);
            if (previous === "jigglypuff") {
                musicNotes = [];
                scribbles = [];
            }
            if (previous === "unicorn") {
                scribbles = [];
            }
            sendOverlay({});
        }

        function updateMiniGame(dt) {
            if (!M.inGame || !Game.active) {
                Game.lastTick = performance.now();
                Game.overlayPayload = {};
                return;
            }
            const justClicked =
                Game.pointer.down && !Game.state.pointerWasDown;
            Game.state.pointerWasDown = Game.pointer.down;
            Game.state.justClicked = justClicked;
            M.gameTimer -= dt;
            if (M.gameTimer <= 0) {
                endMiniGame(M.gameScore >= 5);
                return;
            }
            runGameForPet(Game.active, dt);
            if (Game.overlayPayload && Game.overlayPayload.type) {
                Game.overlayPayload.active = true;
                Game.overlayPayload.score = M.gameScore;
                Game.overlayPayload.timeLeft = Math.max(
                    0,
                    Math.ceil(M.gameTimer),
                );
            }
        }

        function rewardAffection(amount) {
            try {
                const settings = JSON.parse(
                    localStorage.getItem("app_settings") || "{}",
                );
                settings.affectionPoints =
                    (settings.affectionPoints || 0) + amount;
                localStorage.setItem(
                    "app_settings",
                    JSON.stringify(settings),
                );
            } catch (e) { }
        }

        // ===== Input bridge (overlay -> pet window) =====
        // overlay.html should ipcRenderer.send('overlay-input', {type:'move|down|up', x, y})
        ipcRenderer.on("overlay-input", (e, payload) => {
            if (!payload) return;
            if (payload.type === "move") {
                Game.pointer.x = payload.x;
                Game.pointer.y = payload.y;
            }
            if (payload.type === "down") {
                Game.pointer.down = true;
            }
            if (payload.type === "up") {
                Game.pointer.down = false;
            }
        });

        // ===== Game Dispatcher =====
        function initGameForPet(pet) {
            if (pet === "cat") initCatGame();
            if (pet === "dog") initDogGame();
            if (pet === "lizard") initLizardGame();
            if (pet === "snake") initSnakeGame();
            if (pet === "unicorn") initUnicornGame();
            if (pet === "jigglypuff") initJigglyGame();
            if (pet === "pikachu") initPikaGame();
            if (pet === "person") initPersonGame();
        }

        function runGameForPet(pet, dt) {
            if (pet === "cat") updateCatGame(dt);
            if (pet === "dog") updateDogGame(dt);
            if (pet === "lizard") updateLizardGame(dt);
            if (pet === "snake") updateSnakeGame(dt);
            if (pet === "unicorn") updateUnicornGame(dt);
            if (pet === "jigglypuff") updateJigglyGame(dt);
            if (pet === "pikachu") updatePikaGame(dt);
            if (pet === "person") updatePersonGame(dt);
        }

        // ===== Helpers =====
        function hitTest(x, y, target, r = 18) {
            const dx = x - target.x,
                dy = y - target.y;
            return dx * dx + dy * dy <= r * r;
        }
        // ===== Cat: Window Pounce (5 pixel mice) =====
        function initCatGame() {
            Game.state.mice = Array.from({ length: 5 }).map(() => ({
                x: Math.random() * sw,
                y: 40 + Math.random() * (sh - 120),
                peek: Math.random() * 40,
                hide: Math.random() * 40,
                visible: true,
                vx: (Math.random() - 0.5) * 2,
                vy: 0,
                legPhase: 0,
                scared: false,
                life: 999,
            }));
            Game.state.cool = 0;
        }
        function updateCatGame(dt) {
            const mice = Game.state.mice;
            Game.state.cool = Math.max(0, Game.state.cool - 1);
            mice.forEach((m) => {
                if (m.visible) m.peek -= 1;
                else m.hide -= 1;
                if (m.peek <= 0 && m.visible) {
                    m.visible = false;
                    m.hide = 20 + Math.random() * 40;
                }
                if (m.hide <= 0 && !m.visible) {
                    m.visible = true;
                    m.peek = 20 + Math.random() * 30;
                    m.x = Math.random() * sw;
                    m.y = 40 + Math.random() * (sh - 120);
                }
                if (m.visible) advancePixelMouse(m);
                if (
                    Game.state.justClicked &&
                    m.visible &&
                    hitTest(Game.pointer.x, Game.pointer.y, m, 18) &&
                    Game.state.cool === 0
                ) {
                    M.gameScore += 1;
                    Game.state.cool = 10;
                    m.visible = false;
                    m.hide = 25;
                    spawnP("star", 2);
                    M.tx = m.x - PET_ANCHOR_X;
                    M.ty = m.y - PET_ANCHOR_Y;
                    M.mood = "run";
                }
            });
            Game.overlayPayload = { type: "cat", mice };
        }

        // ===== Dog: High-Speed Fetch =====
        function initDogGame() {
            Game.state.bone = {
                x: sw * 0.5,
                y: sh * 0.4,
                vx: 7,
                vy: 5,
                angle: 0,
            };
            Game.state.combo = 0;
            Game.state.comboTimer = 0;
            Game.state.catchCooldown = 0;
        }
        function updateDogGame(dt) {
            const b = Game.state.bone;
            b.x += b.vx;
            b.y += b.vy;
            b.angle += 0.06;
            if (b.x < 30 || b.x > sw - 30) b.vx *= -1;
            if (b.y < 30 || b.y > sh - 30) b.vy *= -1;
            const dx = b.x - petCenterX(),
                dy = b.y - petCenterY();
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (Game.state.catchCooldown > 0)
                Game.state.catchCooldown -= 1;
            if (Game.state.comboTimer > 0) {
                Game.state.comboTimer -= 1;
                if (Game.state.comboTimer <= 0) Game.state.combo = 0;
            }
            if (dist < 40 && Game.state.catchCooldown <= 0) {
                M.gameScore += 1;
                Game.state.combo =
                    Game.state.comboTimer > 0
                        ? Game.state.combo + 1
                        : 1;
                Game.state.comboTimer = 40;
                Game.state.catchCooldown = 12;
                b.vx *= 1.07;
                b.vy *= 1.07;
            }
            if (currentPet === "dog") {
                M.tx = b.x - PET_ANCHOR_X;
                M.ty = b.y - PET_ANCHOR_Y;
                M.mood = "run";
            }
            Game.overlayPayload = {
                type: "dog",
                bone: b,
                combo: Game.state.combo,
            };
        }

        // ===== Lizard: Fly Swatter =====
        function spawnGameFly() {
            bugs.push({
                x: 20 + Math.random() * (sw - 40),
                y: 40 + Math.random() * (sh - 140),
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 999,
                dead: false,
                stunned: false,
                stunTimer: 0,
                game: true,
            });
        }
        function initLizardGame() {
            bugs = [];
            for (let i = 0; i < 6; i++) spawnGameFly();
            Game.state.tongue = null;
        }
        function updateLizardGame(dt) {
            // Clean version comes later in file
        }

        // ===== Snake: Growth Game =====

        // ===== Dog: High-Speed Fetch =====
        function initDogGame() {

            if (b.x < 30 || b.x > sw - 30) b.vx *= -1;

            if (Game.state.comboTimer > 0) {

            }
            if (currentPet === "dog") {

                M.mood = "run";
            }
            Game.overlayPayload = {

                bone: b,
                combo: Game.state.combo,
            };
        }

        // ===== Lizard: Fly Swatter =====
        function spawnGameFly() {
            bugs.push({
                x: 20 + Math.random() * (sw - 40),
                y: 40 + Math.random() * (sh - 140),
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 999,
                dead: false,
                stunned: false,
                stunTimer: 0,
                game: true,
            });
        }
        function initLizardGame() {
            bugs = [];
            for (let i = 0; i < 6; i++) spawnGameFly();
            Game.state.tongue = null;
        }
        function updateLizardGame(dt) {
            if (bugs.length < 6 && Math.random() < 0.05) spawnGameFly();
            if (Game.state.tongue && --Game.state.tongue.life <= 0)
                Game.state.tongue = null;
            Game.overlayPayload = {
                type: "lizard",
                tongue: Game.state.tongue,
            };
        }

        // ===== Snake: Icon Slither =====
        function spawnGameEgg() {
            return {
                x: 40 + Math.random() * (sw - 80),
                y: 60 + Math.random() * (sh - 140),
            };
        }
        function setSnakeDirection(dx, dy) {
            const sn = Game.state.snake;
            if (!sn) return;
            if (sn.dir.x === -dx && sn.dir.y === -dy) return;
            sn.dir = { x: dx, y: dy };
        }
        function initSnakeGame() {
            Game.state.snake = {
                x: petCenterX(),
                y: petCenterY(),
                dir: { x: 1, y: 0 },
                speed: 4.2,
                len: 16,
                body: [],
            };
            Game.state.eggs = [spawnGameEgg(), spawnGameEgg()];
            Game.state.eggTimer = 0;
            M.snakeSegs = 18;
        }
        function updateSnakeGame(dt) {
            const sn = Game.state.snake;
            if (!sn) return;
            sn.x += sn.dir.x * sn.speed;
            sn.y += sn.dir.y * sn.speed;
            if (sn.x < 10) sn.x = sw - 10;
            if (sn.x > sw - 10) sn.x = 10;
            if (sn.y < 20) sn.y = sh - 20;
            if (sn.y > sh - 20) sn.y = 20;
            sn.body.push({ x: sn.x, y: sn.y });
            while (sn.body.length > sn.len) sn.body.shift();

            M.tx = sn.x - PET_ANCHOR_X;
            M.ty = sn.y - PET_ANCHOR_Y;
            M.mood = "run";
            M.facing = sn.dir.x >= 0 ? 1 : -1;

            const eggs = Game.state.eggs || [];
            eggs.forEach((e, i) => {
                const dx = e.x - sn.x;
                const dy = e.y - sn.y;
                if (dx * dx + dy * dy < 18 * 18) {
                    eggs.splice(i, 1);
                    sn.len += 4;
                    M.snakeSegs = Math.min(40, M.snakeSegs + 2);
                    M.gameScore += 1;
                    spawnP("star", 3);
                }
            });
            Game.state.eggTimer -= dt;
            if (Game.state.eggTimer <= 0 && eggs.length < 4) {
                eggs.push(spawnGameEgg());
                Game.state.eggTimer = 1.2 + Math.random() * 1.2;
            }

            Game.overlayPayload = {
                type: "snake",
                body: sn.body,
                eggs,
            };
        }

        // ===== Unicorn: Rainbow Painter =====
        function initUnicornGame() {
            Game.state.stars = [];
            Game.state.dim = 0.55;
            Game.state.trail = [];
            Game.state.lastTrail = null;
            Game.state.trailScribble = {
                pts: [],
                drawn: 0,
                permanent: true,
                strokeW: 1.6,
            };
            scribbles = [Game.state.trailScribble];
        }
        function updateUnicornGame(dt) {
            const last = Game.state.lastTrail;
            const p = Game.pointer;
            if (!last || Math.hypot(p.x - last.x, p.y - last.y) > 12) {
                const pt = { x: p.x, y: p.y };
                Game.state.lastTrail = pt;
                Game.state.trail.push(pt);
                if (Game.state.trailScribble) {
                    Game.state.trailScribble.pts.push(pt);
                    Game.state.trailScribble.drawn =
                        Game.state.trailScribble.pts.length;
                }
                Game.state.stars.push({
                    x: pt.x,
                    y: pt.y,
                    rot: Math.random() * Math.PI * 2,
                    color: `hsl(${Math.random() * 360},80%,70%)`,
                });
                if (Game.state.stars.length > 80)
                    Game.state.stars.shift();
            }

            const stars = Game.state.stars || [];
            if (stars.length) {
                let closest = null;
                let closestD = 1e9;
                stars.forEach((s) => {
                    const dx = s.x - petCenterX();
                    const dy = s.y - petCenterY();
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < closestD) {
                        closestD = d;
                        closest = s;
                    }
                });
                if (closest) {
                    M.tx = closest.x - PET_ANCHOR_X;
                    M.ty = closest.y - PET_ANCHOR_Y;
                    M.mood = closestD > 90 ? "run" : "walk";
                    M.facing = closest.x > petCenterX() ? 1 : -1;
                    if (closestD < 22) {
                        const idx = stars.indexOf(closest);
                        if (idx >= 0) stars.splice(idx, 1);
                        Game.state.dim = Math.max(
                            0.1,
                            (Game.state.dim || 0.5) - 0.02,
                        );
                        M.gameScore += 1;
                        spawnP("star", 2);
                    }
                }
            }

            Game.overlayPayload = {
                type: "unicorn",
                stars: Game.state.stars,
                dim: Game.state.dim,
            };
        }

            if (!drag) return;

        });

            if (!drag || e.button !== 0) return;
            const wasDrag = dragMoved;
            drag = null;
            dragMoved = false;
            if (!wasDrag) {
                const now = Date.now();

        // Build a scribble stroke in SCREEN coordinates
        // centerX/centerY = screen position of Jigglypuff's drawing hand
        function buildScribble(centerX, centerY) {
            // Random spread: draw scribble anywhere near current screen position
            const ox = centerX + (Math.random() - 0.5) * 120;
            const oy = centerY + (Math.random() - 0.5) * 80;
            const type = Math.floor(Math.random() * 3);
            const pts = [];
            if (type === 0) {
                // spiral
                const loops = 1.2 + Math.random() * 1.5,
                    steps = Math.floor(loops * 22);
                for (let i = 0; i < steps; i++) {
                    const a = (i / steps) * Math.PI * 2 * loops;
                    const r =
                        (i / steps) * 18 * (0.7 + Math.random() * 0.6);
                    pts.push({
                        x: ox + Math.cos(a) * r,
                        y: oy + Math.sin(a) * r,
                    });
                }
            } else if (type === 1) {
                // zigzag
                let lx = ox - 25,
                    ly = oy;
                pts.push({ x: lx, y: ly });
                for (let i = 0; i < 8; i++) {
                    lx += 10 + Math.random() * 10;
                    ly += (Math.random() - 0.5) * 22;
                    pts.push({ x: lx, y: ly });
                }
            } else {
                // arc / eyebrow
                for (let i = 0; i <= 14; i++) {
                    const a = (i / 14) * Math.PI;
                    pts.push({
                        x: ox - 22 + Math.cos(a) * 22,
                        y: oy - Math.sin(a) * 11,
                    });
                }
            }
            return {
                pts, // in SCREEN coordinates
                drawn: 0,
                permanent: true,
                strokeW: 2 + Math.random() * 1.5,
            };
        }

                        options: { temperature: 0.95, num_predict: 180 },

        // Pixel mouse (cat chases it)
        let pixelMouse = null;
        function spawnPixelMouse() {
            const side = Math.random() < 0.5;
            pixelMouse = {
                x: side ? -30 : sw + 30,
                y: screenFloorY() - 18 - Math.random() * 80,
                vx: side ? 2.2 : -2.2,
                vy: 0,
                legPhase: 0,
                scared: false,
                life: 600,
            };
        }
        function advancePixelMouse(mouse) {
            mouse.life--;
            if (mouse.life <= 0) return false;
            mouse.legPhase += 0.2;
            // wander
            mouse.vy += (Math.random() - 0.5) * 0.15;
            mouse.vy *= 0.9;
            mouse.y = Math.max(
                70,
                Math.min(screenFloorY() - 10, mouse.y + mouse.vy),
            );
            // flee from cat (run faster when cat is close)
            const dx = mouse.x - petCenterX(),
                dy = mouse.y - petCenterY();
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 60) {
                mouse.scared = true;
                mouse.vx = (dx / dist) * 3.5;
                mouse.vy = (dy / dist) * 2;
            } else {
                mouse.scared = false;
            }
            mouse.x += mouse.vx;
            return true;
        }
        function updatePixelMouse() {
            if (!pixelMouse) return;
            if (!advancePixelMouse(pixelMouse)) {
                pixelMouse = null;
                return;
            }
            // cat catches mouse
            const dx = pixelMouse.x - petCenterX(),
                dy = pixelMouse.y - petCenterY();
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 18 && currentPet === "cat") {
                showBubble("GOT IT! 🐁 ♥");
                spawnP("star", 4);
                spawnP("heart", 2);
                pixelMouse = null;
                setTimeout(() => {
                    if (currentPet === "cat" && B.mouse) spawnPixelMouse();
                }, 4000);
                return;
            }
            if (pixelMouse.x < -50 || pixelMouse.x > sw + 50) {
                pixelMouse = null;
            }
        }

        // Snake orbit around fixed screen position (simulated desktop icon area)
        let orbitTarget = null;

        let orbitActive = false;
        function startOrbit() {
            // Pick a random "icon" position on screen (lower portion, grid-like)
            const col = Math.floor(Math.random() * 4),
                row = Math.floor(Math.random() * 3);
            orbitTarget = {
                x: sw - 100 - col * 80,
                y: 80 + row * 90,
            };
            orbitActive = true;
            orbitAngle = 0;
            showBubble("*circles your app* 🐍", 3000);
        }
        function updateOrbit() {
            if (!orbitActive || !orbitTarget) return;
            orbitAngle += 0.025;
            const radius = 55;
            const tx = orbitTarget.x + Math.cos(orbitAngle) * radius - 110;
            const ty = orbitTarget.y + Math.sin(orbitAngle) * radius - 110;
            moveWin(tx, ty);
            M.facing = Math.cos(orbitAngle + 0.1) > 0 ? 1 : -1;
            if (orbitAngle > Math.PI * 4) {
                // 2 full loops
                orbitActive = false;
                orbitTarget = null;
                showBubble("*slithers away*");
                M.tx = null;
                M.ty = null;
            }
        }

        // Bone flies toward cursor and returns to cursor
        let cursorX = sw / 2,
            cursorY = sh / 2;
        // Track real cursor on screen via mousemove
        document.addEventListener("mousemove", (e) => {
            cursorX = e.screenX;
            cursorY = e.screenY;
        });

        function throwBoneAtCursor() {
            if (bone) return;
            // Direction from window center toward cursor
            const targetX = cursorX - petCenterX();
            const targetY = cursorY - petCenterY();
            const dist = Math.sqrt(targetX * targetX + targetY * targetY);
            const nx = dist > 5 ? targetX / dist : 1;
            const ny = dist > 5 ? targetY / dist : 0;
            bone = {
                x: petCenterX(),
                y: petCenterY(),
                vx: nx * 9,
                vy: ny * 6 - 3,
                angle: 0,
                spin: 0.25,
                landed: false,
                returning: false,
                // store cursor world position for return
                returnWX: cursorX,
                returnWY: cursorY,
            };
            M.fetching = true;
            showBubble("fetch! 🦴");
        }
        function spawnP(type, n) {

        // ═══════════════════════════════════════════
        // DRAW HELPERS
        // ═══════════════════════════════════════════
        function drawHeart(x, y, sz, col) {
            C.save();
            C.translate(x, y);
            C.fillStyle = col;
            C.beginPath();
            C.moveTo(0, 0);
            C.bezierCurveTo(-sz / 2, -sz / 2, -sz, sz / 4, 0, sz);
            C.bezierCurveTo(sz, sz / 4, sz / 2, -sz / 2, 0, 0);
            C.fill();
            C.restore();
        }
        function drawStar(x, y, sz, rot) {
            C.save();
            C.translate(x, y);
            C.rotate(rot);
            C.beginPath();
            for (let i = 0; i < 5; i++) {
                const a = (i * 4 * Math.PI) / 5 - Math.PI / 2,
                    b = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
                i === 0
                    ? C.moveTo(Math.cos(a) * sz, Math.sin(a) * sz)
                    : C.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
                C.lineTo(Math.cos(b) * sz * 0.4, Math.sin(b) * sz * 0.4);
            }
            C.closePath();
            C.fillStyle = "#ffe082";
            C.fill();
            C.restore();
        }
        function leg(x, y, angDeg, len, c1, c2, pc = "#ce93d8") {
            const a = (angDeg * Math.PI) / 180,
                kx = x + Math.cos(a) * len * 0.5,
                ky = y + Math.sin(a) * len * 0.5,
                la = a - 0.35,
                fx = kx + Math.cos(la) * len * 0.55,
                fy = ky + Math.sin(la) * len * 0.55;
            C.lineWidth = 6;
            C.lineCap = "round";
            C.strokeStyle = c1;
            C.beginPath();
            C.moveTo(x, y);
            C.lineTo(kx, ky);
            C.stroke();
            C.strokeStyle = c2;
            C.beginPath();
            C.moveTo(kx, ky);
            C.lineTo(fx, fy);
            C.stroke();
            C.beginPath();
            C.ellipse(fx, fy + 2, 5, 3.5, 0.1, 0, Math.PI * 2);
            C.fillStyle = pc;
            C.fill();
        }
        function ear(
            x,
            y,
            tilt,
            right,
            col = "#b388ff",
            inner = "#ea80fc",
        ) {
            C.save();
            C.translate(x, y);
            C.rotate(tilt);
            C.beginPath();
            C.moveTo(0, 0);
            C.lineTo(right ? 9 : -9, -14);
            C.lineTo(right ? -2 : 2, -14);
            C.closePath();
            C.fillStyle = col;
            C.fill();
            C.strokeStyle = "rgba(0,0,0,.2)";
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.moveTo(0, -1);
            C.lineTo(right ? 6 : -6, -11);
            C.lineTo(right ? -1 : 1, -11);
            C.closePath();
            C.fillStyle = inner;
            C.fill();
            C.restore();
        }

        // ═══════════════════════════════════════════
        // DRAW CAT (Pink Version)
        // ═══════════════════════════════════════════
        function drawCat(cx, cy) {
            const lp = M.legPhase,
                br = Math.sin(M.breathPhase) * 1.2,
                jy = M.jumping ? M.jumpY : 0,
                by = cy - jy;
            const flip = M.facing === -1;
            if (flip) {
                C.save();
                C.translate(220, 0);
                C.scale(-1, 1);
            }
            const rx = flip ? 220 - cx : cx;
            // scratch marks are drawn in the overlay (screen-coords) – not here
            const ta = M.tailAngle,
                t1x = rx - 16,
                t1y = by + 8,
                t2x = t1x - 10 + Math.cos(ta) * 20,
                t2y = t1y + 16 + Math.sin(ta) * 8,
                t3x = t2x + Math.cos(ta + 0.9) * 14,
                t3y = t2y - 6 + Math.sin(ta + 0.9) * 8;
            C.beginPath();
            C.moveTo(t1x, t1y);
            C.quadraticCurveTo(t2x, t2y, t3x, t3y);
            C.strokeStyle = "#ffb6c1"; // light pink tail
            C.lineWidth = 5;
            C.lineCap = "round";
            C.stroke();
            C.beginPath();
            C.arc(t3x, t3y, 4.5, 0, Math.PI * 2);
            C.fillStyle = "#ffc0cb"; // pale pink tail tip
            C.fill();
            const mv = M.mood === "walk" || M.mood === "run",
                sw2 = mv ? 16 : 0;
            leg(
                rx - 8,
                by + 12,
                Math.sin(lp + Math.PI) * sw2 + 88,
                17,
                "#ffb6c1", // light pink
                "#ff69b4", // hot pink
                "#ffc0cb"
            );
            leg(
                rx + 6,
                by + 12,
                Math.sin(lp) * sw2 + 88,
                17,
                "#ffb6c1",
                "#ff69b4",
                "#ffc0cb"
            );
            C.beginPath();
            C.ellipse(
                rx,
                by + 6,
                20 + br * 0.3,
                24 + br,
                0,
                0,
                Math.PI * 2,
            );
            C.fillStyle = "#ffb6c1"; // main body light pink
            C.fill();
            C.strokeStyle = "#ff69b4"; // hot pink outline
            C.lineWidth = 1.4;
            C.stroke();
            C.beginPath();
            C.ellipse(
                rx,
                by + 10,
                (20 + br * 0.3) * 0.55,
                (24 + br) * 0.55,
                0,
                0,
                Math.PI * 2,
            );
            C.fillStyle = "#ffe4e1"; // misty rose belly
            C.fill();
            if (M.scratching) {
                leg(
                    rx - 12,
                    by + 16,
                    Math.sin(tick * 0.35) * 40 - 10 + 50,
                    21,
                    "#ffb6c1",
                    "#ff69b4",
                    "#ffc0cb"
                );
                leg(
                    rx + 8,
                    by + 16,
                    Math.sin(lp + Math.PI) * sw2 + 82,
                    19,
                    "#ffb6c1",
                    "#ff69b4",
                    "#ffc0cb"
                );
                if (tick % 8 === 0) {
                    // Store in SCREEN coords so the marks stay where the cat scratched
                    const scrX = wx + (flip ? 5 : 215);
                    const scrY = wy + by;
                    scratchMarks.push({
                        alpha: 0.7,
                        lines: [
                            [
                                scrX,
                                scrY - 10 + Math.random() * 20,
                                scrX + (flip ? 15 : -15),
                                scrY + Math.random() * 20,
                            ],
                            [
                                scrX + 2,
                                scrY - 5 + Math.random() * 15,
                                scrX + (flip ? 12 : -12),
                                scrY + 5 + Math.random() * 15,
                            ],
                        ],
                    });
                    if (scratchMarks.length > 8) scratchMarks.shift();
                }
            } else {
                leg(
                    rx - 12,
                    by + 16,
                    Math.sin(lp) * sw2 + 82,
                    19,
                    "#ffb6c1",
                    "#ff69b4",
                    "#ffc0cb"
                );
                leg(
                    rx + 8,
                    by + 16,
                    Math.sin(lp + Math.PI) * sw2 + 82,
                    19,
                    "#ffb6c1",
                    "#ff69b4",
                    "#ffc0cb"
                );
            }
            C.save();
            C.translate(rx, by - 20);
            C.beginPath();
            C.ellipse(0, 0, 19, 17, 0, 0, Math.PI * 2);
            C.fillStyle = "#ffb6c1";
            C.fill();
            C.strokeStyle = "#ff69b4";
            C.lineWidth = 1.4;
            C.stroke();
            ear(-13, -11, -0.55, false, "#ffb6c1", "#ff69b4");
            ear(13, -11, 0.55, true, "#ffb6c1", "#ff69b4");
            C.beginPath();
            C.ellipse(-13, 5, 7, 5, -0.3, 0, Math.PI * 2);
            C.fillStyle = "rgba(255,105,180,0.3)";
            C.fill();
            C.beginPath();
            C.ellipse(13, 5, 7, 5, 0.3, 0, Math.PI * 2);
            C.fillStyle = "rgba(255,105,180,0.3)";
            C.fill();
            const blink = !M.eyeOpen;
            [-7, 7].forEach((ex) => {
                if (blink) {
                    C.beginPath();
                    C.arc(ex, -1, 3.5, Math.PI + 0.4, -0.4);
                    C.strokeStyle = "#ad1457"; // dark pink
                    C.lineWidth = 1.8;
                    C.lineCap = "round";
                    C.stroke();
                } else {
                    C.beginPath();
                    C.ellipse(ex, -1, 3.5, 4.5, 0, 0, Math.PI * 2);
                    C.fillStyle = "#4a0072"; // deep violet/pink
                    C.fill();
                    C.beginPath();
                    C.arc(ex - 0.8, -2.5, 1.2, 0, Math.PI * 2);
                    C.fillStyle = "rgba(255,255,255,.75)";
                    C.fill();
                }
            });
            C.beginPath();
            C.moveTo(0, 4);
            C.lineTo(-2.5, 7);
            C.lineTo(2.5, 7);
            C.closePath();
            C.fillStyle = "#ff1493"; // deep pink nose
            C.fill();
            C.beginPath();
            C.moveTo(-4, 9);
            C.quadraticCurveTo(0, 12, 4, 9);
            C.strokeStyle = "#ad1457"; // dark pink
            C.lineWidth = 1.2;
            C.lineCap = "round";
            C.stroke();
            C.strokeStyle = "rgba(255,255,255,.6)";
            C.lineWidth = 0.85;
            [
                [-4, 6, -21, 4],
                [-4, 8, -21, 9],
                [4, 6, 21, 4],
                [4, 8, 21, 9],
            ].forEach(([x1, y1, x2, y2]) => {
                C.beginPath();
                C.moveTo(x1, y1);
                C.lineTo(x2, y2);
                C.stroke();
            });
            C.restore();
            if (flip) C.restore();
        }

        // ═══════════════════════════════════════════
        // DRAW DOG (Pink Version)

        function drawDog(cx, cy) {
            const lp = M.legPhase,
                br = Math.sin(M.breathPhase) * 1.3,
                jy = M.jumping ? M.jumpY : 0,

                pinkDark,

            leg(
                rx + 8,
                by + 14,
                Math.sin(lp) * sw2 + 90,
                19,
                pinkMain,
                pinkDark,

            C.beginPath();
            C.ellipse(rx, by + 6, 22, 26 + br, 0, 0, Math.PI * 2);

            C.fill();
            C.strokeStyle = pinkDark;
            C.lineWidth = 1.5;
            C.stroke();
            C.beginPath();
            C.ellipse(rx, by + 10, 12, 14, 0, 0, Math.PI * 2);

            leg(
                rx - 12,

                pinkMain,

            leg(
                rx + 10,
                by + 18,
                Math.sin(lp + Math.PI) * sw2 + 84,
                21,
                pinkMain,
                pinkDark,
                pawPink,
            );
            C.save();
            C.translate(rx + 4, by - 18);
            C.beginPath();
            C.ellipse(-16, 6, 7, 14, -0.3, 0, Math.PI * 2);
            C.fillStyle = pinkDark;
            C.fill();
            C.beginPath();
            C.ellipse(16, 6, 7, 14, 0.3, 0, Math.PI * 2);
            C.fillStyle = pinkDark;
            C.fill();
            C.beginPath();
            C.ellipse(0, 0, 20, 18, 0, 0, Math.PI * 2);
            C.fillStyle = pinkMain;
            C.fill();
            C.strokeStyle = pinkDark;

            C.stroke();

            C.fill();
            C.beginPath();
            C.ellipse(0, 5, 8, 6, 0, 0, Math.PI * 2);
            C.fillStyle = "#ffb6c1";
            C.fill();
            C.beginPath();
            C.ellipse(0, 3, 5, 3.5, 0, 0, Math.PI * 2);
            C.fillStyle = "#ad1457"; // dark pink nose
            C.fill();
            [-8, 8].forEach((ex) => {
                if (!M.eyeOpen) {
                    C.beginPath();

                    C.beginPath();
                    C.arc(ex - 1, -5, 1.3, 0, Math.PI * 2);
                    C.fillStyle = "rgba(255,255,255,.7)";
                    C.fill();

            });
            if (M.howling) {

        }

        // ═══════════════════════════════════════════
        // DRAW LIZARD (Pink Version)
        // ═══════════════════════════════════════════
        function drawLizard(cx, cy) {
            const t = tick,
                lp = M.legPhase,
                br = Math.sin(M.breathPhase) * 0.8;
            const flip = M.facing === -1;
            if (flip) {
                C.save();
                C.translate(220, 0);
                C.scale(-1, 1);
            }
            const rx = flip ? 220 - cx : cx;
            const pinkMain = "#ffb6c1";
            const pinkDark = "#ff69b4";
            const pinkLight = "#ffc0cb";
            C.beginPath();
            C.moveTo(rx + 18, cy + 4);
            C.quadraticCurveTo(
                rx + 35 + Math.sin(t * 0.05) * 8,
                cy + 12,
                rx + 45 + Math.sin(t * 0.04) * 12,
                cy + 6 + Math.cos(t * 0.06) * 8,
            );
            C.strokeStyle = pinkMain;
            C.lineWidth = 5;
            C.lineCap = "round";
            C.stroke();
            C.beginPath();
            C.moveTo(
                rx + 45 + Math.sin(t * 0.04) * 12,
                cy + 6 + Math.cos(t * 0.06) * 8,
            );
            C.quadraticCurveTo(
                rx + 55 + Math.sin(t * 0.05) * 8,
                cy + 4,
                rx + 60 + Math.sin(t * 0.07) * 6,
                cy + Math.cos(t * 0.05) * 6,
            );
            C.strokeStyle = pinkLight;
            C.lineWidth = 3;
            C.stroke();
            const mv = M.mood === "walk" || M.mood === "run",
                ls = mv ? 22 : 0;
            [
                [rx - 12, cy - 4, Math.sin(lp) * ls - 140, 12],
                [rx - 12, cy + 10, Math.sin(lp + Math.PI) * ls - 120, 12],
                [rx + 14, cy - 4, Math.sin(lp + Math.PI) * ls - 40, 12],
                [rx + 14, cy + 10, Math.sin(lp) * ls - 20, 12],
            ].forEach(([lx, ly, la, ll]) => {
                const a = (la * Math.PI) / 180;
                C.strokeStyle = pinkMain;
                C.lineWidth = 4;
                C.lineCap = "round";
                C.beginPath();
                C.moveTo(lx, ly);
                C.lineTo(
                    lx + Math.cos(a) * ll * 0.6,
                    ly + Math.sin(a) * ll * 0.6,
                );
                C.stroke();
                C.strokeStyle = pinkDark;
                C.beginPath();
                C.moveTo(
                    lx + Math.cos(a) * ll * 0.6,
                    ly + Math.sin(a) * ll * 0.6,
                );
                C.lineTo(lx + Math.cos(a) * ll, ly + Math.sin(a) * ll);
                C.stroke();
                C.beginPath();
                C.arc(
                    lx + Math.cos(a) * ll,
                    ly + Math.sin(a) * ll,
                    3,
                    0,
                    Math.PI * 2,
                );
                C.fillStyle = pinkDark;
                C.fill();
            });
            C.beginPath();
            C.ellipse(rx, cy + 2, 18, 10 + br, 0, 0, Math.PI * 2);
            C.fillStyle = pinkMain;
            C.fill();
            C.strokeStyle = pinkDark;
            C.lineWidth = 1.2;
            C.stroke();
            for (let i = -2; i <= 2; i++) {
                C.beginPath();
                C.arc(rx + i * 6, cy + 2, 3, Math.PI, 0);
                C.strokeStyle = pinkLight;
                C.lineWidth = 0.8;
                C.stroke();
            }
            C.save();
            C.translate(rx - 16, cy - 2);
            C.beginPath();
            C.ellipse(0, 0, 14, 8, -0.1, 0, Math.PI * 2);
            C.fillStyle = pinkMain;
            C.fill();
            C.strokeStyle = pinkDark;
            C.lineWidth = 1.2;
            C.stroke();
            C.beginPath();
            C.arc(-4, -2, 4, 0, Math.PI * 2);
            C.fillStyle = "#4a0072"; // dark violet/pink eye
            C.fill();
            C.beginPath();
            C.arc(-3, -3, 1.5, 0, Math.PI * 2);
            C.fillStyle = "rgba(255,255,200,.8)";
            C.fill();
            C.beginPath();
            C.arc(-10, 0, 1.5, 0, Math.PI * 2);
            C.fillStyle = pinkDark;
            C.fill();
            if (t % 30 < 15 || M.eating) {
                const tl = M.eating ? 16 : 10;
                C.beginPath();
                C.moveTo(-14, 1);
                C.lineTo(-14 - tl * 0.6, 1);
                C.strokeStyle = "#ff1493"; // deep pink tongue
                C.lineWidth = 2;
                C.lineCap = "round";
                C.stroke();
                C.beginPath();
                C.moveTo(-14 - tl * 0.6, 1);
                C.lineTo(-14 - tl, 1 - 3);
                C.moveTo(-14 - tl * 0.6, 1);
                C.lineTo(-14 - tl, 1 + 3);
                C.stroke();
            }
            C.restore();
            if (flip) C.restore();
        }

        // ═══════════════════════════════════════════
        // DRAW SNAKE (Pink Version)
        // ═══════════════════════════════════════════
        function drawSnake(cx, cy) {
            const t = tick,
                segs = M.snakeSegs || 18,
                sl = 8,
                wamp = 18,
                wfreq = 0.08;
            for (let i = segs; i >= 0; i--) {
                const ratio = i / segs;
                const bx = cx - i * sl * Math.cos(0.1);
                const by = cy + Math.sin(t * wfreq + i * 0.4) * wamp * ratio;
                const r = 5 + (1 - ratio) * 6;
                // Pink gradient: light pink to deep pink
                const rVal = 255;
                const gVal = Math.floor(182 - ratio * 50);
                const bVal = Math.floor(203 - ratio * 50);
                C.beginPath();
                C.arc(bx, by, r, 0, Math.PI * 2);
                C.fillStyle = `rgb(${rVal}, ${Math.max(130, gVal)}, ${Math.max(150, bVal)})`;
                C.fill();
                if (i % 3 === 0) {
                    C.beginPath();
                    C.arc(bx, by - r * 0.4, r * 0.3, 0, Math.PI * 2);
                    C.fillStyle = "rgba(255,182,193,0.3)";
                    C.fill();
                }
            }
            C.save();
            C.translate(cx, cy);
            C.beginPath();
            C.ellipse(M.facing * 12, 0, 16, 10, 0, 0, Math.PI * 2);
            C.fillStyle = "#ff69b4"; // hot pink head
            C.fill();
            C.strokeStyle = "#c71585"; // medium violet red
            C.lineWidth = 1.2;
            C.stroke();
            const ex = M.facing * 18;
            C.beginPath();
            C.arc(ex, -3, 4, 0, Math.PI * 2);
            C.fillStyle = "#ff80ab"; // pink eye
            C.fill();
            C.beginPath();
            C.arc(ex, -3, 2, 0, Math.PI * 2);
            C.fillStyle = "#4a0072"; // dark violet/pink pupil
            C.fill();
            C.beginPath();
            C.arc(ex + 0.5, -3.5, 1, 0, Math.PI * 2);
            C.fillStyle = "rgba(255,255,255,.6)";
            C.fill();
            if (M.hissing || t % 40 < 20) {
                const tx = M.facing * (28 + Math.sin(t * 0.4) * 3);
                C.beginPath();
                C.moveTo(M.facing * 24, 1);
                C.lineTo(tx, 1);
                C.strokeStyle = "#ff1493"; // deep pink tongue
                C.lineWidth = 2.5;
                C.lineCap = "round";
                C.stroke();
                C.beginPath();
                C.moveTo(tx, 1);
                C.lineTo(tx + M.facing * 5, -4);
                C.moveTo(tx, 1);
                C.lineTo(tx + M.facing * 5, 6);
                C.stroke();
            }
            if (M.hissing) {
                C.globalAlpha = 0.9;
                C.font = "bold 11px monospace";
                C.fillStyle = "#ff1493";
                C.fillText("HSSSSS", M.facing * 30, -10);
                C.globalAlpha = 1;
            }
            if (M.eating) {
                C.beginPath();
                C.ellipse(-M.facing * 20, 4, 10, 8, 0, 0, Math.PI * 2);
                C.fillStyle = "rgba(255,200,100,0.5)";
                C.fill();
            }
            C.restore();
        }

        // ═══════════════════════════════════════════
        // DRAW UNICORN
        // ═══════════════════════════════════════════
        function drawUnicorn(cx, cy) {
            const lp = M.legPhase,
                br = Math.sin(M.breathPhase) * 1.2,
                jy = M.jumping ? M.jumpY : 0,
                by = cy - jy;
            const flip = M.facing === -1;
            if (flip) {
                C.save();
                C.translate(220, 0);
                C.scale(-1, 1);
            }
            const rx = flip ? 220 - cx : cx;
            const wht = "#f3f0ff",
                mane = "#e040fb";
            const rc = [
                "#ff4081",
                "#ff9100",
                "#ffea00",
                "#69f0ae",
                "#40c4ff",
                "#e040fb",
            ];
            // Rainbow puke drawn on fullscreen overlay (not clipped to pet canvas)
            const ta = M.tailAngle;
            rc.forEach((col, i) => {
                const off = i * 0.5;
                C.beginPath();
                C.moveTo(rx + 16, by + 4 + i);
                C.quadraticCurveTo(
                    rx + 28 + Math.cos(ta + off) * 16 + i,
                    by + 12 + Math.sin(ta + off) * 10,
                    rx + 22 + Math.cos(ta + off) * 24 + i * 2,
                    by + 4 + Math.sin(ta + off) * 16 + i,
                );
                C.strokeStyle = col;
                C.lineWidth = 3;
                C.lineCap = "round";
                C.stroke();
            });
            const mv = M.mood === "walk" || M.mood === "run",
                gs = mv ? 22 : 0,
                gA = Math.sin(lp) * gs,
                gB = Math.sin(lp + Math.PI) * gs;
            leg(rx - 12, by + 14, gB + 88, 20, wht, "#d1c4e9", "#b39ddb");
            leg(rx + 6, by + 14, gA + 88, 20, wht, "#d1c4e9", "#b39ddb");
            C.beginPath();
            C.ellipse(rx, by + 6, 22, 26 + br, 0, 0, Math.PI * 2);
            C.fillStyle = wht;
            C.fill();
            C.strokeStyle = "#d1c4e9";
            C.lineWidth = 1.4;
            C.stroke();
            [
                [0, 0],
                [8, -6],
                [-8, 4],
                [5, 8],
            ].forEach(([dx, dy]) => {
                C.beginPath();
                C.arc(rx + dx, by + 6 + dy, 3, 0, Math.PI * 2);
                C.fillStyle = `hsla(${(tick * 2 + dx * 20) % 360},80%,80%,.4)`;
                C.fill();
            });
            leg(rx - 14, by + 18, gA + 82, 22, wht, "#d1c4e9", "#b39ddb");
            leg(rx + 8, by + 18, gB + 82, 22, wht, "#d1c4e9", "#b39ddb");
            C.save();
            C.translate(rx - 2, by - 22);
            C.beginPath();
            C.ellipse(0, 0, 18, 16, -0.1, 0, Math.PI * 2);
            C.fillStyle = wht;
            C.fill();
            C.strokeStyle = "#d1c4e9";
            C.lineWidth = 1.4;
            C.stroke();
            C.beginPath();
            C.moveTo(-10, -12);
            C.lineTo(-14, -24);
            C.lineTo(-4, -14);
            C.closePath();
            C.fillStyle = wht;
            C.fill();
            C.strokeStyle = "#d1c4e9";
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.moveTo(10, -12);
            C.lineTo(14, -24);
            C.lineTo(4, -14);
            C.closePath();
            C.fillStyle = wht;
            C.fill();
            C.stroke();
            C.save();
            C.translate(0, -16);
            for (let i = 0; i < 6; i++) {
                C.beginPath();
                C.ellipse(0, -i * 4, 3 - i * 0.4, 2, 0, 0, Math.PI * 2);
                C.fillStyle = rc[i % rc.length];
                C.fill();
            }
            C.restore();
            rc.forEach((col, i) => {
                C.beginPath();
                C.moveTo(6 - i, -8);
                C.quadraticCurveTo(14 - i, 2 + i, 10 - i, 12 + i * 2);
                C.strokeStyle = col;
                C.lineWidth = 3;
                C.lineCap = "round";
                C.stroke();
            });
            [-7, 7].forEach((ex) => {
                C.beginPath();
                C.arc(ex, -2, 4, 0, Math.PI * 2);
                C.fillStyle = "#4a148c";
                C.fill();
                C.beginPath();
                C.arc(ex - 1, -3, 1.5, 0, Math.PI * 2);
                C.fillStyle = "rgba(255,255,255,.9)";
                C.fill();
                C.fillStyle = `hsl(${(tick * 5 + ex * 10) % 360},100%,70%)`;
                C.font = "8px serif";
                C.fillText("✦", ex + 3, -6);
            });
            if (M.rainbowing) {
                C.beginPath();
                C.ellipse(-16, 5, 8, 6, -0.3, 0, Math.PI * 2);
                C.fillStyle = "#111";
                C.fill();
                rc.forEach((col, i) => {
                    C.beginPath();
                    C.moveTo(-20, 5);
                    C.quadraticCurveTo(
                        -30 + i,
                        -5 + i * 3,
                        -40 - i * 3,
                        5 + i * 2,
                    );
                    C.strokeStyle = col;
                    C.lineWidth = 3;
                    C.lineCap = "round";
                    C.stroke();
                });
            } else {
                C.beginPath();
                C.arc(-12, 6, 3, 0, Math.PI * 2);
                C.fillStyle = "#ff8a80";
                C.fill();
            }
            C.restore();
            if (flip) C.restore();
        }

        // ═══════════════════════════════════════════
        // DRAW JIGGLYPUFF
        // ═══════════════════════════════════════════

        function drawJigglypuff(cx, cy) {
            const t = tick;
            const jy = M.jumping ? M.jumpY : 0;
            const by = cy - jy;
            const breath = B.bounce ? Math.sin(M.breathPhase) * 1.2 : 0;
            const puffScale =
                M.scribbling || M.angry
                    ? 1.12 + Math.abs(Math.sin(t * 0.18)) * 0.14
                    : M.singing
                        ? 1.02 + Math.abs(Math.sin(t * 0.12)) * 0.05
                        : 1;

            // shadow under body
            C.beginPath();
            C.ellipse(
                cx,
                by + 48,
                20 * puffScale,
                5 + (puffScale - 1) * 8,
                0,
                0,
                Math.PI * 2,
            );
            C.fillStyle = "rgba(0,0,0,0.12)";
            C.fill();

            // ── NEW CHARACTER DRAWING ────────────────────────────────────
            C.save();
            // translate to body center and apply slight tilt
            C.translate(cx, by + 18);
            C.rotate(0.03); // subtle tilt

            // BODY – wider (50px) and slightly taller (44px) to keep roundness
            const bodyW = 50 * puffScale,
                bodyH = (44 + breath) * puffScale;
            const scaleFactor = bodyW / 42; // ~1.19 for horizontal scaling

            // Draw body with gradient
            C.beginPath();
            C.ellipse(0, 0, bodyW / 2, bodyH / 2, 0, 0, Math.PI * 2);
            const grad = C.createRadialGradient(-5, -5, 5, 0, 0, bodyW / 2);
            grad.addColorStop(0, "#ffb7c5");
            grad.addColorStop(0.7, "#ff8da1");
            grad.addColorStop(1, "#e6718f");
            C.fillStyle = grad;
            C.fill();
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1.5;
            C.stroke();

            // FEET – oval, scaled horizontally
            C.fillStyle = "#ffb7c5";
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1.2;
            const footX = 14 * scaleFactor; // was 14
            C.beginPath();
            C.ellipse(-footX, bodyH / 2 + 4, 8, 5, 0, 0, Math.PI * 2);
            C.fill();
            C.stroke();
            C.beginPath();
            C.ellipse(footX, bodyH / 2 + 4, 8, 5, 0, 0, Math.PI * 2);
            C.fill();
            C.stroke();

            // ARMS (state dependent)
            const armY = -4;
            const armBob = Math.sin(t * 0.08) * 2;
            const armX = 24 * scaleFactor; // was 24

            // Left arm
            C.beginPath();
            C.ellipse(-armX, armY + armBob, 8, 6, -0.2, 0, Math.PI * 2);
            C.fillStyle = "#ffb7c5";
            C.fill();
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1.2;
            C.stroke();

            // Right arm based on state
            if (M.hasMic) {
                C.beginPath();
                C.ellipse(
                    armX,
                    armY - 4 + armBob,
                    8,
                    6,
                    0.2,
                    0,
                    Math.PI * 2,
                );
                C.fillStyle = "#ffb7c5";
                C.fill();
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 1.2;
                C.stroke();
                // MIC
                C.save();
                C.translate(armX + 2, armY - 10);
                C.rotate(0.3);
                C.fillStyle = "#333";
                C.fillRect(-2, -12, 4, 12);
                C.beginPath();
                C.arc(0, -12, 7, 0, Math.PI * 2);
                C.fillStyle = "#555";
                C.fill();
                C.beginPath();
                C.arc(0, -12, 5, 0, Math.PI * 2);
                C.fillStyle = "#aaa";
                C.fill();
                C.beginPath();
                C.arc(-2, -14, 2, 0, Math.PI * 2);
                C.fillStyle = "rgba(255,255,255,0.4)";
                C.fill();
                C.restore();
            } else if (M.penDown) {
                const ang = 0.6;
                const ex = armX + Math.cos(ang) * 18;
                const ey = armY + Math.sin(ang) * 18;
                C.beginPath();
                C.moveTo(armX - 8, armY);
                C.lineTo(ex, ey);
                C.strokeStyle = "#ffb7c5";
                C.lineWidth = 10;
                C.lineCap = "round";
                C.stroke();
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 1.2;
                C.stroke();
                C.beginPath();
                C.arc(ex, ey, 7, 0, Math.PI * 2);
                C.fillStyle = "#ffb7c5";
                C.fill();
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 1.2;
                C.stroke();
                C.save();
                C.translate(ex, ey);
                C.rotate(ang + 0.5);
                C.fillStyle = "#1a237e";
                C.fillRect(-2, -16, 4, 16);
                C.fillStyle = "#3949ab";
                C.fillRect(-2, -16, 4, 8);
                C.fillStyle = "#1a1a1a";
                C.fillRect(-1, -2, 2, 6);
                C.restore();
            } else if (M.angry) {
                C.beginPath();
                C.ellipse(
                    armX + 2,
                    armY - 10 + armBob,
                    8,
                    6,
                    0.5,
                    0,
                    Math.PI * 2,
                );
                C.fillStyle = "#ffb7c5";
                C.fill();
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 1.2;
                C.stroke();
            } else {
                C.beginPath();
                C.ellipse(armX, armY + armBob, 8, 6, 0.2, 0, Math.PI * 2);
                C.fillStyle = "#ffb7c5";
                C.fill();
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 1.2;
                C.stroke();
            }

            // HAIR CURL (forehead swirl) – stays centered
            C.save();
            C.translate(0, -bodyH / 2 + 4);
            C.beginPath();
            C.moveTo(-4, -2);
            C.bezierCurveTo(-10, -8, -8, -16, 0, -18);
            C.bezierCurveTo(8, -20, 12, -12, 6, -6);
            C.bezierCurveTo(2, -2, -2, -2, -4, -2);
            C.fillStyle = "#ffb7c5";
            C.fill();
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1.5;
            C.stroke();
            C.restore();

            // EYES – large teal, scaled horizontally
            const eyeX = 12 * scaleFactor; // was 12
            // left eye
            C.save();
            C.translate(-eyeX, -8);
            C.beginPath();
            C.ellipse(0, 0, 10, 12, 0, 0, Math.PI * 2);
            C.fillStyle = "#ffffff";
            C.fill();
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1;
            C.stroke();
            const eyeGrad = C.createRadialGradient(-2, -2, 2, 0, 0, 7);
            eyeGrad.addColorStop(0, "#40e0d0");
            eyeGrad.addColorStop(0.7, "#008b8b");
            eyeGrad.addColorStop(1, "#006666");
            C.beginPath();
            C.ellipse(0, 0, 7, 9, 0, 0, Math.PI * 2);
            C.fillStyle = eyeGrad;
            C.fill();
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.ellipse(0, 1, 4, 5, 0, 0, Math.PI * 2);
            C.fillStyle = "#1a1a1a";
            C.fill();
            C.beginPath();
            C.arc(-3, -3, 2, 0, Math.PI * 2);
            C.fillStyle = "white";
            C.fill();
            C.beginPath();
            C.arc(2, 0, 1.2, 0, Math.PI * 2);
            C.fillStyle = "rgba(255,255,255,0.8)";
            C.fill();
            C.restore();

            // right eye
            C.save();
            C.translate(eyeX, -8);
            C.beginPath();
            C.ellipse(0, 0, 10, 12, 0, 0, Math.PI * 2);
            C.fillStyle = "#ffffff";
            C.fill();
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1;
            C.stroke();
            const eyeGrad2 = C.createRadialGradient(-2, -2, 2, 0, 0, 7);
            eyeGrad2.addColorStop(0, "#40e0d0");
            eyeGrad2.addColorStop(0.7, "#008b8b");
            eyeGrad2.addColorStop(1, "#006666");
            C.beginPath();
            C.ellipse(0, 0, 7, 9, 0, 0, Math.PI * 2);
            C.fillStyle = eyeGrad2;
            C.fill();
            C.strokeStyle = "#4a2a2a";
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.ellipse(0, 1, 4, 5, 0, 0, Math.PI * 2);
            C.fillStyle = "#1a1a1a";
            C.fill();
            C.beginPath();
            C.arc(-3, -3, 2, 0, Math.PI * 2);
            C.fillStyle = "white";
            C.fill();
            C.beginPath();
            C.arc(2, 0, 1.2, 0, Math.PI * 2);
            C.fillStyle = "rgba(255,255,255,0.8)";
            C.fill();
            C.restore();

            // MOUTH (and angry brows)
            C.save();
            C.translate(0, 2);
            if (M.singing) {
                C.beginPath();
                C.ellipse(0, 12, 8, 6, 0, 0, Math.PI * 2);
                C.fillStyle = "#ff8a80";
                C.fill();
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 1;
                C.stroke();
                C.beginPath();
                C.ellipse(0, 16, 5, 3, 0, 0, Math.PI * 2);
                C.fillStyle = "#ff6b6b";
                C.fill();
            } else if (M.angry) {
                C.beginPath();
                C.moveTo(-6, 14);
                C.quadraticCurveTo(0, 8, 6, 14);
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 2;
                C.lineCap = "round";
                C.stroke();
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 2;
                C.beginPath();
                C.moveTo(-16, -18);
                C.lineTo(-8, -14);
                C.stroke();
                C.beginPath();
                C.moveTo(16, -18);
                C.lineTo(8, -14);
                C.stroke();
            } else {
                C.beginPath();
                C.moveTo(-6, 12);
                C.quadraticCurveTo(0, 16, 6, 12);
                C.strokeStyle = "#4a2a2a";
                C.lineWidth = 1.5;
                C.lineCap = "round";
                C.stroke();
            }
            C.restore();

            // blush (scaled horizontally)
            if (B.blush) {
                const blushX = 18 * scaleFactor; // was 18
                C.beginPath();
                C.ellipse(-blushX, 2, 5, 3, 0, 0, Math.PI * 2);
                C.fillStyle = "rgba(255,100,130,0.2)";
                C.fill();
                C.beginPath();
                C.ellipse(blushX, 2, 5, 3, 0, 0, Math.PI * 2);
                C.fillStyle = "rgba(255,100,130,0.2)";
                C.fill();
            }

            C.restore(); // restore from tilt/translate

            // Scribbles are drawn on the fullscreen overlay window (not here)
            // This prevents them being clipped to the 220x220 pet canvas
        }
        // ═══════════════════════════════════════════
        // DRAW PIKACHU
        // ═══════════════════════════════════════════
        function drawPikachu(cx, cy) {
            const t = tick,
                jy = M.jumping ? M.jumpY : 0,
                by = cy - jy;
            const br = Math.sin(M.breathPhase) * 1.2;
            const yel = "#ffcc02",
                dyel = "#e6b800",
                brn = "#8B4513";
            const face = pikachuFaceTimer > 0 ? pikachuFace : "normal";

            // Lightning drawn on fullscreen overlay (not clipped to pet canvas)

            // shadow
            C.beginPath();
            C.ellipse(cx, by + 52, 20, 4, 0, 0, Math.PI * 2);
            C.fillStyle = "rgba(0,0,0,0.12)";
            C.fill();

            // tail (zigzag lightning bolt shape) - adjusted position slightly for slimmer body
            C.save();
            C.translate(cx + 18, by + 20); // was +20
            C.beginPath();
            C.moveTo(0, 0);
            C.lineTo(8, -8);
            C.lineTo(4, -4);
            C.lineTo(12, -16);
            C.lineTo(8, -12);
            C.lineTo(16, -22);
            C.strokeStyle = dyel;
            C.lineWidth = 8;
            C.lineCap = "round";
            C.lineJoin = "round";
            C.stroke();
            C.strokeStyle = "#f9a825";
            C.lineWidth = 4;
            C.stroke();
            C.restore();

            // ears (black tips)
            C.save();
            C.translate(cx, by - 16);
            // left ear
            C.beginPath();
            C.moveTo(-18, 0);
            C.lineTo(-24, -28);
            C.lineTo(-10, -24);
            C.closePath();
            C.fillStyle = yel;
            C.fill();
            C.strokeStyle = dyel;
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.moveTo(-18, -2);
            C.lineTo(-23, -24);
            C.lineTo(-12, -21);
            C.closePath();
            C.fillStyle = "#1a1a1a";
            C.fill();
            // right ear
            C.beginPath();
            C.moveTo(18, 0);
            C.lineTo(24, -28);
            C.lineTo(10, -24);
            C.closePath();
            C.fillStyle = yel;
            C.fill();
            C.strokeStyle = dyel;
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.moveTo(18, -2);
            C.lineTo(23, -24);
            C.lineTo(12, -21);
            C.closePath();
            C.fillStyle = "#1a1a1a";
            C.fill();
            C.restore();

            // legs (stay at same positions)
            C.beginPath();
            C.ellipse(cx - 12, by + 46, 8, 10, -0.1, 0, Math.PI * 2);
            C.fillStyle = yel;
            C.fill();
            C.strokeStyle = dyel;
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.ellipse(cx + 12, by + 46, 8, 10, 0.1, 0, Math.PI * 2);
            C.fillStyle = yel;
            C.fill();
            C.strokeStyle = dyel;
            C.lineWidth = 1;
            C.stroke();
            C.beginPath();
            C.ellipse(cx - 12, by + 54, 10, 5, 0, 0, Math.PI * 2);
            C.fillStyle = brn;
            C.fill();
            C.beginPath();
            C.ellipse(cx + 12, by + 54, 10, 5, 0, 0, Math.PI * 2);
            C.fillStyle = brn;
            C.fill();

            // BODY – slimmed down: width 20 (was 22)
            C.beginPath();
            C.ellipse(cx, by + 18, 20, 28 + br, 0, 0, Math.PI * 2);
            C.fillStyle = yel;
            C.fill();
            C.strokeStyle = dyel;
