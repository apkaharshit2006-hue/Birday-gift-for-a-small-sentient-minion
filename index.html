<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:220px; height:220px; background:transparent; overflow:hidden; user-select:none; }
#stage { width:220px; height:220px; position:relative; cursor:default; }
#pet-canvas { position:absolute; top:0; left:0; width:220px; height:220px; }
#bubble {
  position:absolute; top:4px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.96); color:#1a0a40;
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:11px; font-weight:600; padding:4px 10px;
  border-radius:12px; white-space:nowrap; opacity:0;
  transition:opacity 0.2s; pointer-events:none;
  border:1px solid rgba(100,100,255,0.3); z-index:20;
  max-width:210px; overflow:hidden; text-overflow:ellipsis;
}
#bubble.show { opacity:1; }
/* Settings hint tooltip */
#hint {
  position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.7);
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:9px; padding:3px 8px; border-radius:8px;
  opacity:0; transition:opacity 0.2s; pointer-events:none;
  white-space:nowrap;
}
#stage:hover #hint { opacity:1; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="pet-canvas" width="220" height="220"></canvas>
  <div id="bubble"></div>
  <div id="hint">double-click = settings · drag = move</div>
</div>
<script>
const { ipcRenderer } = require('electron');
const { AI_MODEL, buildSystemPrompt, parseResponse } = require('./pet-ai');
const canvas = document.getElementById('pet-canvas');
const C = canvas.getContext('2d');
const bubbleEl = document.getElementById('bubble');
const PET_WINDOW_WIDTH = 220;
const PET_WINDOW_HEIGHT = 220;
const PET_ANCHOR_X = 110;
const PET_ANCHOR_Y = 130;
const FLOOR_MARGIN = 36;

function clampPetWindow(x, y) {
  return {
    x: Math.max(-PET_ANCHOR_X, Math.min(sw - PET_ANCHOR_X, x)),
    y: Math.max(-PET_ANCHOR_Y, Math.min(sh - PET_ANCHOR_Y, y)),
  };
}

function petCenterX() { return wx + PET_ANCHOR_X; }
function petCenterY() { return wy + PET_ANCHOR_Y; }
function screenFloorY() { return Math.max(80, sh - FLOOR_MARGIN); }

// ═══════════════════════════════════════════
// SCREEN INFO
// ═══════════════════════════════════════════
let sw=1440, sh=900, wx=700, wy=680;
async function refreshScreen() {
  const i = await ipcRenderer.invoke('get-screen-info');
  sw=i.sw; sh=i.sh; wx=i.wx; wy=i.wy;
}
refreshScreen();
setInterval(refreshScreen, 1500);
function moveWin(x,y) {
  const next = clampPetWindow(x, y);
  wx=next.x;
  wy=next.y;
  ipcRenderer.send('set-win-pos',{x:wx,y:wy});
}

// Send effects data to fullscreen overlay window
// Converts canvas-local coords to screen coords
function sendOverlay() {
  // Convert scribble pts from canvas-local to screen coords
  // Scribble pts are already in screen coords (built with wx+110 offset)
  const screenScribbles = scribbles;
  // Lightning: canvas-local x + wx, segs same
  const screenLightnings = lightnings.map(l=>({
    ...l,
    x: l.x + wx,
    segs: l.segs ? l.segs.map(s=>({ x: s.x+wx, y: s.y+wy })) : []
  }));
  // Rainbow puke: canvas-local → screen
  const screenRainbow = rainbowPuke.map(p=>({
    ...p,
    x: p.x + wx,
    y: p.y + wy,
  }));
  const worldEffects = {
    pixelMouse,
    mug,
    bone,
    cupcake,
    ketchup,
    yarnBalls,
    bugs,
    humans,
    musicNotes,
  };
  ipcRenderer.send('overlay-draw', {
    scribbles: screenScribbles,
    lightnings: screenLightnings,
    rainbowPuke: screenRainbow,
    worldEffects,
  });
}
function clearOverlay() {
  ipcRenderer.send('overlay-clear');
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentPet = 'cat';
let tick = 0;
let particles = [];
let scratchMarks = [];
let bugs = [];
let humans = [];
let yarnBalls = [];
let rainbowPuke = [];
let bone = null;
let musicNotes = [];
let scribbles = [];
let ketchup = null;
let lightnings = [];
let pikachuFace = 'normal';
let pikachuFaceTimer = 0;

// LLM / chat state
let llmThinking = false;        // waiting for Ollama response
let llmEmotion = 'happy';       // last detected emotion
let thinkTimer = 0;             // thinking animation tick
let autoReactTimer = 900;       // countdown to next autonomous action
let idleTimer = 0;              // how long pet has been idle
let lastAutoReact = 0;          // timestamp of last auto-reaction
let autonomousThinking = false;
let autonomousRecentActions = [];
let aiEnabled = true;
let jigglyScribbleTimer = null;

// behaviour toggles (all on by default)
const B = {
  scratch:true, yarn:true, mouse:true, yawn:true, purr:true,
  fetch:true, howl:true, tongue:true, tailwag:true, mug:true,
  bugs:true, wallcrawl:true, scales:true,
  hiss:true, humans:true, slither:true, orbit:true,
  rainbow:true, gallop:true, shimmer:true, mane:true, cupcake:true,
  sing:true, mic:true, blush:true, bounce:true,
  thunder:true, ketchup:true, faces:true, cheeks:true,
};

const M = {
  tx:null, ty:null, walkTimer:120,
  mood:'idle', facing:1,
  legPhase:0, tailAngle:0, breathPhase:0,
  blinkTimer:100, eyeOpen:true,
  sleeping:false, energy:90, happiness:80, hunger:70,
  purring:false, purrTimer:0,
  scratching:false, scratchTimer:0,
  yawning:false, yawnTimer:0,
  jumping:false, jumpY:0, jumpVY:0,
  eating:false, eatTimer:0,
  howling:false, howlTimer:0,
  hissing:false, hissTimer:0,
  fetching:false,
  rainbowing:false, rainbowTimer:0,
  singing:false, singTimer:0,
  angry:false, angryTimer:0,
  thundering:false, thunderTimer:0,
  hasMic:true,
  // jigglypuff scribble system
  scribbling:false,
  scribbleProgress:0,
  scribbleTarget:null,
  scribbleWalking:false,
  penDown:false,
  // LLM-driven animations
  bouncing:false, bounceTimer:0,    // happy bounce
  drooping:false, droopTimer:0,     // sad droop
  llmJumping:false, llmJumpTimer:0, // surprised jump
};

// ═══════════════════════════════════════════
// BUBBLE
// ═══════════════════════════════════════════
let bubT;
function showBubble(txt,ms=2400) {
  bubbleEl.textContent=txt;
  bubbleEl.classList.add('show');
  clearTimeout(bubT);
  bubT=setTimeout(()=>bubbleEl.classList.remove('show'),ms);
}

// ═══════════════════════════════════════════
// DRAG — single=interact, double=settings, drag=move
// focusable:true means drag + keyboard both work now
// ═══════════════════════════════════════════
let drag=null, lastClick=0, dragMoved=false;
let manualMoveHoldUntil=0;

document.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  drag={sx:e.screenX, sy:e.screenY};
  dragMoved=false;
});
document.addEventListener('mousemove', e=>{
  if(!drag) return;
  const dx=e.screenX-drag.sx, dy=e.screenY-drag.sy;
  if(Math.abs(dx)+Math.abs(dy)>4){
    dragMoved=true;
    manualMoveHoldUntil=Date.now()+7000;
    M.tx=null; M.ty=null; M.mood='idle';
    ipcRenderer.send('move-window',{dx,dy});
    drag.sx=e.screenX; drag.sy=e.screenY;
  }
});
document.addEventListener('mouseup', e=>{
  if(!drag||e.button!==0) return;
  const wasDrag=dragMoved;
  drag=null; dragMoved=false;
  if(!wasDrag){
    const now=Date.now();
    if(now-lastClick<350){ ipcRenderer.send('open-settings'); }
    else { handleClick(); openChat(); }
    lastClick=now;
  }
});
document.addEventListener('contextmenu',e=>{
  e.preventDefault();
  ipcRenderer.send('open-settings');
});

// ═══════════════════════════════════════════
// IPC FROM SETTINGS WINDOW
// ═══════════════════════════════════════════
ipcRenderer.on('switch-pet', (e, petName) => {
  switchPet(petName);
});
ipcRenderer.on('toggle-behaviour', (e, { id, enabled }) => {
  B[id] = enabled;
});

// ── LLM / Chat IPC ────────────────────────────────────────────────────────────
ipcRenderer.on('pet-thinking', (e, on) => {
  if(!aiEnabled) return;
  llmThinking = on;
  thinkTimer = 0;
  if(on) showBubble('...', 99999);
});

ipcRenderer.on('pet-response', (e, { text, emotion, actions }) => {
  if(!aiEnabled) return;
  llmThinking = false;
  llmEmotion = emotion || 'happy';
  // Show short version in bubble (max 60 chars)
  const bubbleText = text.length > 60 ? text.substring(0,57)+'...' : text;
  showBubble(bubbleText, 4000);
  // Trigger animation based on emotion
  if(emotion === 'sad'){    M.drooping=true;  M.droopTimer=180; }
  else if(emotion === 'surprised'){ M.llmJumping=true; M.llmJumpTimer=40; M.jumping=true; M.jumpY=0; M.jumpVY=-14; }
  else { M.bouncing=true; M.bounceTimer=120; }
  applyLLMActions(actions);
});
ipcRenderer.on('ai-enabled-changed', (e, enabled) => {
  aiEnabled = !!enabled;
  if(!aiEnabled){
    llmThinking = false;
    autonomousThinking = false;
  }
});

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&currentPet==='dog'&&B.fetch) throwBone();
  if(e.code==='Space'&&currentPet==='unicorn'&&B.rainbow) triggerRainbow();
  if(e.code==='Space'&&currentPet==='pikachu'&&B.thunder) triggerThunder();
  if(e.code==='KeyM'&&currentPet==='jigglypuff'&&B.mic&&M.hasMic&&!e.repeat) takeMic();
});
document.addEventListener('keyup',e=>{
  if(e.code==='KeyM'&&currentPet==='jigglypuff'&&!M.hasMic) returnMic();
});

// ═══════════════════════════════════════════
// SWITCH PET
// ═══════════════════════════════════════════
function switchPet(name) {
  currentPet=name;
  stopJigglyScribbleLoop();
  M.eating=false;M.howling=false;M.hissing=false;M.fetching=false;
  M.rainbowing=false;M.singing=false;M.angry=false;M.thundering=false;
  M.scratching=false;M.hasMic=true;
  M.scribbling=false;M.scribbleWalking=false;M.scribbleTarget=null;M.penDown=false;
  scratchMarks=[];bugs=[];humans=[];yarnBalls=[];
  rainbowPuke=[];bone=null;musicNotes=[];scribbles=[];
  ketchup=null;lightnings=[];pikachuFace='normal';pikachuFaceTimer=0;
  pixelMouse=null;mug=null;dogInMug=false;cupcake=null;
  orbitActive=false;orbitTarget=null;orbitAngle=0;
  autonomousRecentActions=[];
  clearOverlay();
  M.mood='idle';M.tx=null;M.ty=null;
  const names={cat:'🐈 meow~',dog:'🐕 woof woof!',lizard:'🦎 *tongue flick*',snake:'🐍 hsssss...',unicorn:'🦄 ✨ magic!',jigglypuff:'🎤 laaaa~',pikachu:'⚡ pika pika!'};
  showBubble(names[name]||'hello!');
  ipcRenderer.send('pet-changed', name);
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function handleClick() {
  const p=currentPet;
  if(p==='cat'){showBubble('purrrr ♥');spawnP('heart',3);M.purring=true;M.purrTimer=100;}
  else if(p==='dog'){showBubble('*wags tail* ♥');spawnP('heart',3);}
  else if(p==='unicorn'){triggerRainbow();}
  else if(p==='lizard'){showBubble('*tongue flick*');}
  else if(p==='snake'){M.hissing=true;M.hissTimer=60;showBubble('HSSSSSS 🐍');}
  else if(p==='jigglypuff'){M.singing=true;M.singTimer=180;showBubble('♪ lala laaa~ ♪',3000);}
  else if(p==='pikachu'){
    const faces=['pika!','...','*_*','pikaaa~','(◕‿◕)'];
    pikachuFace=['overwhelmed','smug','determined','happy','derp'][Math.floor(Math.random()*5)];
    pikachuFaceTimer=100;
    showBubble(faces[Math.floor(Math.random()*faces.length)]);
  }
}
function feed() {
  M.hunger=Math.min(100,M.hunger+35);M.happiness=Math.min(100,M.happiness+15);
  M.eating=true;M.eatTimer=80;
  const msgs={cat:'nom nom 🐟',dog:'*gobble* 🦴',lizard:'*snap* 🦟',snake:'*gulp* 👤',unicorn:'cupcake!! 🧁',jigglypuff:'🍭 yummy!',pikachu:'ketchup!! 🍅'};
  showBubble(msgs[currentPet]||'yum!');spawnP('star',4);
  if(currentPet==='pikachu' && B.ketchup){spawnKetchup();}
}
function play() {
  if(M.energy<15){showBubble('too tired...');return;}
  M.energy=Math.max(0,M.energy-20);M.happiness=Math.min(100,M.happiness+20);
  M.jumping=true;M.jumpY=0;M.jumpVY=-11;
  if(currentPet==='cat' && B.yarn)spawnYarnBall();
  if(currentPet==='dog')throwBone();
  if(currentPet==='unicorn')triggerRainbow();
  if(currentPet==='pikachu')triggerThunder();
  if(currentPet==='jigglypuff'){M.singing=true;M.singTimer=200;showBubble('♪♫ JIGGLY~ ♫♪',3000);}
  else spawnP('star',5);
}

function throwBone() { throwBoneAtCursor(); }
function triggerRainbow() {
  M.rainbowing=true;M.rainbowTimer=130;showBubble('🌈 BLARRGH 🌈');
  for(let i=0;i<22;i++) rainbowPuke.push({x:110,y:100,vx:(Math.random()-.3)*5+M.facing*3,vy:-Math.random()*4-1,color:`hsl(${Math.random()*360},90%,60%)`,size:6+Math.random()*8,life:65+Math.random()*40,maxLife:105});
}
function triggerThunder() {
  M.thundering=true;M.thunderTimer=60;
  showBubble('⚡ THUNDERBOLT!! ⚡',2000);
  for(let i=0;i<5;i++) lightnings.push({x:110+(Math.random()-.5)*80,life:25+Math.random()*15,maxLife:40,segs:[]});
  lightnings.forEach(l=>{
    let lx=l.x,ly=20;
    for(let s=0;s<8;s++){lx+=(Math.random()-.5)*20;ly+=18;l.segs.push({x:lx,y:ly});}
  });
  spawnP('star',6);
}
// Build a scribble stroke in SCREEN coordinates
// centerX/centerY = screen position of Jigglypuff's drawing hand
function buildScribble(centerX, centerY) {
  // Random spread: draw scribble anywhere near current screen position
  const ox = centerX + (Math.random()-0.5)*120;
  const oy = centerY + (Math.random()-0.5)*80;
  const type = Math.floor(Math.random()*3);
  const pts = [];
  if(type===0){
    // spiral
    const loops=1.2+Math.random()*1.5, steps=Math.floor(loops*22);
    for(let i=0;i<steps;i++){
      const a=(i/steps)*Math.PI*2*loops;
      const r=(i/steps)*18*(0.7+Math.random()*.6);
      pts.push({x:ox+Math.cos(a)*r, y:oy+Math.sin(a)*r});
    }
  } else if(type===1){
    // zigzag
    let lx=ox-25, ly=oy;
    pts.push({x:lx,y:ly});
    for(let i=0;i<8;i++){lx+=10+Math.random()*10;ly+=(Math.random()-.5)*22;pts.push({x:lx,y:ly});}
  } else {
    // arc / eyebrow
    for(let i=0;i<=14;i++){const a=(i/14)*Math.PI;pts.push({x:ox-22+Math.cos(a)*22,y:oy-Math.sin(a)*11});}
  }
  return {
    pts,        // in SCREEN coordinates
    drawn: 0,
    permanent: true,
    strokeW: 2+Math.random()*1.5,
  };
}

function addJigglyScribbleAtCurrentSpot() {
  const s = buildScribble(petCenterX(), petCenterY());
  s.active = true;
  scribbles.push(s);
  setTimeout(() => { s.active = false; }, 700);
}

function stopJigglyScribbleLoop() {
  if (jigglyScribbleTimer) {
    clearTimeout(jigglyScribbleTimer);
    jigglyScribbleTimer = null;
  }
}

function scheduleJigglyScribbleLoop(delay = 0) {
  stopJigglyScribbleLoop();
  jigglyScribbleTimer = setTimeout(() => {
    jigglyScribbleTimer = null;
    if (!M.scribbling) return;
    if (M.scribbleWalking || M.penDown) {
      scheduleJigglyScribbleLoop(180);
      return;
    }
    queueNextScribble();
  }, delay);
}

function takeMic() {
  if(!M.hasMic) return;
  M.hasMic=false; M.singing=false; M.angry=true;
  M.scribbling=true; M.scribbleProgress=0;
  scribbles=[];
  showBubble('(╯°□°)╯ MY MIC!!', 3000);
  // Start drawing right away so the action feels responsive.
  M.penDown = true;
  addJigglyScribbleAtCurrentSpot();
  setTimeout(() => {
    if (!M.scribbling) return;
    M.penDown = false;
    scheduleJigglyScribbleLoop(60);
  }, 750);
}

function queueNextScribble() {
  if (!M.scribbling) return;
  // Pick a random spot anywhere on the visible desktop.
  M.scribbleTarget = {
    x: 50 + Math.random() * Math.max(60, sw - 100),
    y: 40 + Math.random() * Math.max(60, sh - 80),
  };
  M.scribbleWalking=true;
  M.penDown=false;
}

function returnMic() {
  if(M.hasMic) return;
  stopJigglyScribbleLoop();
  M.hasMic=true; M.angry=false; M.scribbling=false;
  M.scribbleWalking=false; M.scribbleTarget=null; M.penDown=false;
  // Fade out all scribbles
  scribbles.forEach(s=>s.permanent=false);
  showBubble('♥ yay mic back! ♪', 2000);
  M.singing=true; M.singTimer=150;
}

function spawnKetchup() {
  const fromLeft = Math.random() < .5;
  ketchup = {
    x: fromLeft ? -30 : sw + 30,
    y: screenFloorY() - 10 - Math.random() * 40,
    vx: fromLeft ? 2.8 : -2.8,
    life: 420,
  };
}

// ── Chat + LLM ─────────────────────────────────────────────────────────────────
function openChat() {
  ipcRenderer.send('open-chat');
}

function clampTarget(tx, ty){
  const next = clampPetWindow(tx, ty);
  return { tx: next.x, ty: next.y };
}

function setMoveTarget(tx, ty, mood='walk'){
  const next = clampTarget(tx, ty);
  M.tx = next.tx;
  M.ty = next.ty;
  M.mood = mood;
}

function jumpNow(power=-12){
  M.jumping = true;
  M.jumpY = 0;
  M.jumpVY = power;
}

function performAction(action){
  if(!action) return;
  const safeAction = String(action).trim().toLowerCase();
  const centerX = Math.round(sw/2 - PET_ANCHOR_X);
  const floorY = sh - PET_ANCHOR_Y;
  const roam = pickTarget();

  if(safeAction === 'walk_left') return setMoveTarget(wx - 140, wy, 'walk');
  if(safeAction === 'walk_right') return setMoveTarget(wx + 140, wy, 'walk');
  if(safeAction === 'walk_to_center') return setMoveTarget(centerX, floorY, 'walk');
  if(safeAction === 'walk_random') return setMoveTarget(roam.tx, roam.ty, 'walk');
  if(safeAction === 'run_left') return setMoveTarget(wx - 220, wy, 'run');
  if(safeAction === 'run_right') return setMoveTarget(wx + 220, wy, 'run');
  if(safeAction === 'run_random') return setMoveTarget(roam.tx, roam.ty, 'run');
  if(safeAction === 'jump' || safeAction === 'surprised_jump') return jumpNow(safeAction === 'surprised_jump' ? -14 : -12);
  if(safeAction === 'happy_bounce'){ M.bouncing=true; M.bounceTimer=160; return; }
  if(safeAction === 'sad_droop'){ M.drooping=true; M.droopTimer=180; return; }
  if(safeAction === 'sit_idle'){ M.tx=null; M.ty=null; M.mood='idle'; return; }
  if(safeAction === 'spin'){ M.bouncing=true; M.bounceTimer=100; M.tailAngle += Math.PI; return; }

  if(safeAction === 'scratch' && currentPet === 'cat' && B.scratch){
    M.scratching=true; M.scratchTimer=90; showBubble('*scratch scratch*');
    return;
  }
  if(safeAction === 'chase_mouse' && currentPet === 'cat' && B.mouse){
    if(!pixelMouse) spawnPixelMouse();
    M.mood='run';
    return;
  }
  if(safeAction === 'play_yarn' && currentPet === 'cat' && B.yarn){
    spawnYarnBall(); M.bouncing=true; M.bounceTimer=100;
    return;
  }
  if(safeAction === 'purr' && currentPet === 'cat' && B.purr){
    M.purring=true; M.purrTimer=120; showBubble('purrrr ♥');
    return;
  }

  if(safeAction === 'fetch' && currentPet === 'dog' && B.fetch){ throwBoneAtCursor(); return; }
  if(safeAction === 'howl' && currentPet === 'dog' && B.howl){
    M.howling=true; M.howlTimer=90; showBubble('AWOOOOOO 🌕'); return;
  }
  if(safeAction === 'play_mug' && currentPet === 'dog' && B.mug){
    if(!mug && !dogInMug) spawnMug();
    return;
  }
  if(safeAction === 'zoom' && currentPet === 'dog'){ return setMoveTarget(roam.tx, roam.ty, 'run'); }

  if(safeAction === 'hunt_bug' && currentPet === 'lizard' && B.bugs){
    if(bugs.length < 3) spawnBug();
    return setMoveTarget(roam.tx, roam.ty, 'run');
  }
  if(safeAction === 'wall_crawl' && currentPet === 'lizard' && B.wallcrawl){
    const edgeTargets = [
      { tx: -PET_ANCHOR_X, ty: Math.max(-PET_ANCHOR_Y, Math.min(sh-PET_ANCHOR_Y, wy)) },
      { tx: sw - PET_ANCHOR_X, ty: Math.max(-PET_ANCHOR_Y, Math.min(sh-PET_ANCHOR_Y, wy)) },
      { tx: Math.max(-PET_ANCHOR_X, Math.min(sw-PET_ANCHOR_X, wx)), ty: -PET_ANCHOR_Y },
    ];
    const edge = edgeTargets[Math.floor(Math.random()*edgeTargets.length)];
    return setMoveTarget(edge.tx, edge.ty, 'walk');
  }
  if(safeAction === 'tongue_flick' && currentPet === 'lizard' && B.tongue){ showBubble('*tongue flick*'); return; }

  if(safeAction === 'hiss' && currentPet === 'snake' && B.hiss){ M.hissing=true; M.hissTimer=80; showBubble('HSSSSS'); return; }
  if(safeAction === 'orbit' && currentPet === 'snake' && B.orbit){ startOrbit(); return; }
  if(safeAction === 'slither_random' && currentPet === 'snake' && B.slither){ return setMoveTarget(roam.tx, roam.ty, 'walk'); }

  if(safeAction === 'show_face_sad' && currentPet === 'pikachu' && B.faces){ pikachuFace='overwhelmed'; pikachuFaceTimer=120; return; }
  if(safeAction === 'show_face_surprised' && currentPet === 'pikachu' && B.faces){ pikachuFace='derp'; pikachuFaceTimer=120; return; }

function buildAutonomousPrompt() {
  const recent = autonomousRecentActions.length ? autonomousRecentActions.join(', ') : 'none';
  return [
    'The desktop is quiet and you are acting on your own.',
    `Your current pet form is ${currentPet}.`,
    `Recent actions to avoid repeating immediately: ${recent}.`,
    'Decide one playful, visible thing to do right now with 1-3 actions.',
    'Prefer your special signature animations and movements over generic idling.'
  ].join(' ');
}

async function askOllamaAutonomously() {
  const response = await fetch('http://localhost:11434/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: AI_MODEL,
      system: buildSystemPrompt(currentPet, 'autonomous'),
      prompt: buildAutonomousPrompt(),
      stream: false,
      options: { temperature: 0.95, num_predict: 180 }
    })
  });
  if(!response.ok) throw new Error(`Ollama error: ${response.status}`);
  const data = await response.json();
  return parseResponse(currentPet, data.response || '{}');
}

function canAutonomouslyAct() {
  if(!aiEnabled) return false;
  if(autonomousThinking || llmThinking) return false;
  if(Date.now() < manualMoveHoldUntil) return false;
  if(drag) return false;
  if(M.scribbling || M.howling || M.thundering || M.rainbowing) return false;
  if(M.tx !== null || M.ty !== null || M.fetching || orbitActive) return false;
  return true;
}

async function triggerAutonomousAI() {
  if(!canAutonomouslyAct()) return;
  autonomousThinking = true;
  try {
    const parsed = await askOllamaAutonomously();
    applyAutonomousResponse(parsed);
  } catch (err) {
    triggerFallbackAutoReaction();
  } finally {
    autonomousThinking = false;
  }
}

// Pixel mouse (cat chases it)
let pixelMouse = null;
function spawnPixelMouse() {
  const side = Math.random() < .5;
  pixelMouse = {
    x: side ? -30 : sw + 30,
    y: screenFloorY() - 18 - Math.random() * 80,
    vx: side ? 2.2 : -2.2,
    vy: 0,
    legPhase: 0, scared: false, life: 600,
  };
}
function updatePixelMouse() {
  if(!pixelMouse) return;
  pixelMouse.life--;
  if(pixelMouse.life<=0){pixelMouse=null;return;}
  pixelMouse.legPhase += .2;
  // wander
  pixelMouse.vy += (Math.random()-.5)*.15;
  pixelMouse.vy *= .9;
  pixelMouse.y = Math.max(70, Math.min(screenFloorY() - 10, pixelMouse.y + pixelMouse.vy));
  // flee from cat (run faster when cat is close)
  const dx = pixelMouse.x - petCenterX(), dy = pixelMouse.y - petCenterY();
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist < 60) {
    pixelMouse.scared = true;
    pixelMouse.vx = (dx/dist)*3.5;
    pixelMouse.vy = (dy/dist)*2;
  } else {
    pixelMouse.scared = false;
  }
  pixelMouse.x += pixelMouse.vx;
  // cat catches mouse
  if(dist < 18 && currentPet==='cat') {
    showBubble('GOT IT! 🐁 ♥');spawnP('star',4);spawnP('heart',2);
    pixelMouse = null;
    setTimeout(()=>{ if(currentPet==='cat'&&B.mouse) spawnPixelMouse(); },4000);
    return;
  }
  if(pixelMouse.x < -50 || pixelMouse.x > sw + 50) { pixelMouse=null; }
}

function throwBoneAtCursor() {
  if(bone) return;
  // Direction from window center toward cursor
  const targetX = cursorX - petCenterX();
  const targetY = cursorY - petCenterY();
  const dist = Math.sqrt(targetX*targetX+targetY*targetY);
  const nx = dist>5 ? targetX/dist : 1;
  const ny = dist>5 ? targetY/dist : 0;
  bone = {
    x:petCenterX(), y:petCenterY(),
    vx: nx*9, vy: ny*6-3,
    angle:0, spin:.25,
    landed:false, returning:false,

  if(M.howling){

// DRAW LIZARD
// ═══════════════════════════════════════════
function drawLizard(cx,cy) {
  const t=tick,lp=M.legPhase,br=Math.sin(M.breathPhase)*.8;

  if(flip){C.save();C.translate(220,0);C.scale(-1,1);}
  const rx=flip?220-cx:cx;
  const grn='#4caf50',dgrn='#2e7d32',sgrn='#66bb6a';
  C.beginPath();C.moveTo(rx+18,cy+4);C.quadraticCurveTo(rx+35+Math.sin(t*.05)*8,cy+12,rx+45+Math.sin(t*.04)*12,cy+6+Math.cos(t*.06)*8);C.strokeStyle=grn;C.lineWidth=5;C.lineCap='round';C.stroke();
  C.beginPath();C.moveTo(rx+45+Math.sin(t*.04)*12,cy+6+Math.cos(t*.06)*8);C.quadraticCurveTo(rx+55+Math.sin(t*.05)*8,cy+4,rx+60+Math.sin(t*.07)*6,cy+Math.cos(t*.05)*6);C.strokeStyle=sgrn;C.lineWidth=3;C.stroke();
  const mv=M.mood==='walk'||M.mood==='run',ls=mv?22:0;
  [[rx-12,cy-4,Math.sin(lp)*ls-140,12],[rx-12,cy+10,Math.sin(lp+Math.PI)*ls-120,12],[rx+14,cy-4,Math.sin(lp+Math.PI)*ls-40,12],[rx+14,cy+10,Math.sin(lp)*ls-20,12]].forEach(([lx,ly,la,ll])=>{const a=(la*Math.PI/180);C.strokeStyle=grn;C.lineWidth=4;C.lineCap='round';C.beginPath();C.moveTo(lx,ly);C.lineTo(lx+Math.cos(a)*ll*.6,ly+Math.sin(a)*ll*.6);C.stroke();C.strokeStyle=dgrn;C.beginPath();C.moveTo(lx+Math.cos(a)*ll*.6,ly+Math.sin(a)*ll*.6);C.lineTo(lx+Math.cos(a)*ll,ly+Math.sin(a)*ll);C.stroke();C.beginPath();C.arc(lx+Math.cos(a)*ll,ly+Math.sin(a)*ll,3,0,Math.PI*2);C.fillStyle=dgrn;C.fill();});
  C.beginPath();C.ellipse(rx,cy+2,18,10+br,0,0,Math.PI*2);C.fillStyle=grn;C.fill();C.strokeStyle=dgrn;C.lineWidth=1.2;C.stroke();
  for(let i=-2;i<=2;i++){C.beginPath();C.arc(rx+i*6,cy+2,3,Math.PI,0);C.strokeStyle=sgrn;C.lineWidth=.8;C.stroke();}
  C.save();C.translate(rx-16,cy-2);
  C.beginPath();C.ellipse(0,0,14,8,-.1,0,Math.PI*2);C.fillStyle=grn;C.fill();C.strokeStyle=dgrn;C.lineWidth=1.2;C.stroke();
  C.beginPath();C.arc(-4,-2,4,0,Math.PI*2);C.fillStyle='#1a0a00';C.fill();C.beginPath();C.arc(-3,-3,1.5,0,Math.PI*2);C.fillStyle='rgba(255,255,200,.8)';C.fill();
  C.beginPath();C.arc(-10,0,1.5,0,Math.PI*2);C.fillStyle=dgrn;C.fill();
  if(t%30<15||M.eating){const tl=M.eating?16:10;C.beginPath();C.moveTo(-14,1);C.lineTo(-14-tl*.6,1);C.strokeStyle='#e53935';C.lineWidth=2;C.lineCap='round';C.stroke();C.beginPath();C.moveTo(-14-tl*.6,1);C.lineTo(-14-tl,1-3);C.moveTo(-14-tl*.6,1);C.lineTo(-14-tl,1+3);C.stroke();}
  C.restore();
  if(flip)C.restore();
}

// DRAW SNAKE
// ═══════════════════════════════════════════
function drawSnake(cx,cy) {
  const t=tick,segs=18,sl=8,wamp=18,wfreq=.08;
  for(let i=segs;i>=0;i--){
    const ratio=i/segs,bx=cx-i*sl*Math.cos(.1),by=cy+Math.sin(t*wfreq+i*.4)*wamp*ratio,r=5+(1-ratio)*6,g=Math.floor(40+ratio*160);
    C.beginPath();C.arc(bx,by,r,0,Math.PI*2);C.fillStyle=`rgb(${Math.floor(20+ratio*30)},${g},${Math.floor(20+ratio*20)})`;C.fill();
    if(i%3===0){C.beginPath();C.arc(bx,by-r*.4,r*.3,0,Math.PI*2);C.fillStyle='rgba(100,200,80,0.3)';C.fill();}
  }
  C.save();C.translate(cx,cy);
  C.beginPath();C.ellipse(M.facing*12,0,16,10,0,0,Math.PI*2);C.fillStyle='#1b5e20';C.fill();C.strokeStyle='#0a3d0a';C.lineWidth=1.2;C.stroke();
  const ex=M.facing*18;
  C.beginPath();C.arc(ex,-3,4,0,Math.PI*2);C.fillStyle='#f9a825';C.fill();C.beginPath();C.arc(ex,-3,2,0,Math.PI*2);C.fillStyle='#111';C.fill();C.beginPath();C.arc(ex+.5,-3.5,1,0,Math.PI*2);C.fillStyle='rgba(255,255,255,.6)';C.fill();
  if(M.hissing||t%40<20){const tx=M.facing*(28+Math.sin(t*.4)*3);C.beginPath();C.moveTo(M.facing*24,1);C.lineTo(tx,1);C.strokeStyle='#e53935';C.lineWidth=2.5;C.lineCap='round';C.stroke();C.beginPath();C.moveTo(tx,1);C.lineTo(tx+M.facing*5,-4);C.moveTo(tx,1);C.lineTo(tx+M.facing*5,6);C.stroke();}
  if(M.hissing){C.globalAlpha=.9;C.font='bold 11px monospace';C.fillStyle='#e53935';C.fillText('HSSSSS',M.facing*30,-10);C.globalAlpha=1;}
  if(M.eating){C.beginPath();C.ellipse(-M.facing*20,4,10,8,0,0,Math.PI*2);C.fillStyle='rgba(255,200,100,0.5)';C.fill();}
  C.restore();
}

  rc.forEach((col,i)=>{const off=i*.5;C.beginPath();C.moveTo(rx+16,by+4+i);C.quadraticCurveTo(rx+28+Math.cos(ta+off)*16+i,by+12+Math.sin(ta+off)*10,rx+22+Math.cos(ta+off)*24+i*2,by+4+Math.sin(ta+off)*16+i);C.strokeStyle=col;C.lineWidth=3;C.lineCap='round';C.stroke();});
  const mv=M.mood==='walk'||M.mood==='run',gs=mv?22:0,gA=Math.sin(lp)*gs,gB=Math.sin(lp+Math.PI)*gs;
  leg(rx-12,by+14,gB+88,20,wht,'#d1c4e9','#b39ddb');leg(rx+6,by+14,gA+88,20,wht,'#d1c4e9','#b39ddb');
  C.beginPath();C.ellipse(rx,by+6,22,26+br,0,0,Math.PI*2);C.fillStyle=wht;C.fill();C.strokeStyle='#d1c4e9';C.lineWidth=1.4;C.stroke();
  [[0,0],[8,-6],[-8,4],[5,8]].forEach(([dx,dy])=>{C.beginPath();C.arc(rx+dx,by+6+dy,3,0,Math.PI*2);C.fillStyle=`hsla(${(tick*2+dx*20)%360},80%,80%,.4)`;C.fill();});
  leg(rx-14,by+18,gA+82,22,wht,'#d1c4e9','#b39ddb');leg(rx+8,by+18,gB+82,22,wht,'#d1c4e9','#b39ddb');
  C.save();C.translate(rx-2,by-22);
  C.beginPath();C.ellipse(0,0,18,16,-.1,0,Math.PI*2);C.fillStyle=wht;C.fill();C.strokeStyle='#d1c4e9';C.lineWidth=1.4;C.stroke();
  C.beginPath();C.moveTo(-10,-12);C.lineTo(-14,-24);C.lineTo(-4,-14);C.closePath();C.fillStyle=wht;C.fill();C.strokeStyle='#d1c4e9';C.lineWidth=1;C.stroke();
  C.beginPath();C.moveTo(10,-12);C.lineTo(14,-24);C.lineTo(4,-14);C.closePath();C.fillStyle=wht;C.fill();C.stroke();
  C.save();C.translate(0,-16);for(let i=0;i<6;i++){C.beginPath();C.ellipse(0,-i*4,3-i*.4,2,0,0,Math.PI*2);C.fillStyle=rc[i%rc.length];C.fill();}C.restore();
  rc.forEach((col,i)=>{C.beginPath();C.moveTo(6-i,-8);C.quadraticCurveTo(14-i,2+i,10-i,12+i*2);C.strokeStyle=col;C.lineWidth=3;C.lineCap='round';C.stroke();});
  [-7,7].forEach(ex=>{C.beginPath();C.arc(ex,-2,4,0,Math.PI*2);C.fillStyle='#4a148c';C.fill();C.beginPath();C.arc(ex-1,-3,1.5,0,Math.PI*2);C.fillStyle='rgba(255,255,255,.9)';C.fill();C.fillStyle=`hsl(${(tick*5+ex*10)%360},100%,70%)`;C.font='8px serif';C.fillText('✦',ex+3,-6);});
  if(M.rainbowing){C.beginPath();C.ellipse(-16,5,8,6,-.3,0,Math.PI*2);C.fillStyle='#111';C.fill();rc.forEach((col,i)=>{C.beginPath();C.moveTo(-20,5);C.quadraticCurveTo(-30+i,-5+i*3,-40-i*3,5+i*2);C.strokeStyle=col;C.lineWidth=3;C.lineCap='round';C.stroke();});}
  else{C.beginPath();C.arc(-12,6,3,0,Math.PI*2);C.fillStyle='#ff8a80';C.fill();}

}

// ═══════════════════════════════════════════
// DRAW JIGGLYPUFF
// ═══════════════════════════════════════════

function drawJigglypuff(cx,cy) {
  const t = tick;
  const jy = M.jumping ? M.jumpY : 0;
  const by = cy - jy;
  const breath = B.bounce ? Math.sin(M.breathPhase) * 1.2 : 0;
  const puffScale = M.scribbling || M.angry
    ? 1.12 + Math.abs(Math.sin(t * 0.18)) * 0.14
    : M.singing
      ? 1.02 + Math.abs(Math.sin(t * 0.12)) * 0.05
      : 1;

  // shadow under body
  C.beginPath();C.ellipse(cx, by+48, 20 * puffScale, 5 + (puffScale - 1) * 8, 0, 0, Math.PI*2);
  C.fillStyle='rgba(0,0,0,0.12)';C.fill();

  // ── NEW CHARACTER DRAWING ────────────────────────────────────
  C.save();
  // translate to body center and apply slight tilt
  C.translate(cx, by+18);
  C.rotate(0.03); // subtle tilt

  // BODY – wider (50px) and slightly taller (44px) to keep roundness
  const bodyW = 50 * puffScale, bodyH = (44 + breath) * puffScale;
  const scaleFactor = bodyW / 42; // ~1.19 for horizontal scaling

  // Draw body with gradient
  C.beginPath();C.ellipse(0, 0, bodyW/2, bodyH/2, 0, 0, Math.PI*2);
  const grad = C.createRadialGradient(-5, -5, 5, 0, 0, bodyW/2);
  grad.addColorStop(0, '#ffb7c5');
  grad.addColorStop(0.7, '#ff8da1');
  grad.addColorStop(1, '#e6718f');
  C.fillStyle = grad;
  C.fill();
  C.strokeStyle = '#4a2a2a';
  C.lineWidth = 1.5;
  C.stroke();

  // FEET – oval, scaled horizontally
  C.fillStyle = '#ffb7c5';
  C.strokeStyle = '#4a2a2a';
  C.lineWidth = 1.2;
  const footX = 14 * scaleFactor; // was 14
  C.beginPath();C.ellipse(-footX, bodyH/2+4, 8, 5, 0, 0, Math.PI*2);
  C.fill();C.stroke();
  C.beginPath();C.ellipse(footX, bodyH/2+4, 8, 5, 0, 0, Math.PI*2);
  C.fill();C.stroke();

  // ARMS (state dependent)
  const armY = -4;
  const armBob = Math.sin(t*0.08)*2;
  const armX = 24 * scaleFactor; // was 24

  // Left arm
  C.beginPath();C.ellipse(-armX, armY+armBob, 8, 6, -0.2, 0, Math.PI*2);
  C.fillStyle = '#ffb7c5';
  C.fill();
  C.strokeStyle = '#4a2a2a';
  C.lineWidth = 1.2;
  C.stroke();

  // Right arm based on state
  if(M.hasMic){
    C.beginPath();C.ellipse(armX, armY-4+armBob, 8, 6, 0.2, 0, Math.PI*2);
    C.fillStyle = '#ffb7c5';
    C.fill();
    C.strokeStyle = '#4a2a2a';
    C.lineWidth = 1.2;
    C.stroke();
    // MIC
    C.save();C.translate(armX+2, armY-10);C.rotate(0.3);
    C.fillStyle = '#333';C.fillRect(-2,-12,4,12);
    C.beginPath();C.arc(0,-12,7,0,Math.PI*2);C.fillStyle='#555';C.fill();
    C.beginPath();C.arc(0,-12,5,0,Math.PI*2);C.fillStyle='#aaa';C.fill();
    C.beginPath();C.arc(-2,-14,2,0,Math.PI*2);C.fillStyle='rgba(255,255,255,0.4)';C.fill();
    C.restore();
  } else if(M.penDown){
    const ang = 0.6;
    const ex = armX + Math.cos(ang)*18;
    const ey = armY + Math.sin(ang)*18;
    C.beginPath();C.moveTo(armX-8, armY);C.lineTo(ex, ey);
    C.strokeStyle = '#ffb7c5';C.lineWidth = 10;C.lineCap='round';C.stroke();
    C.strokeStyle = '#4a2a2a';C.lineWidth = 1.2;C.stroke();
    C.beginPath();C.arc(ex, ey, 7, 0, Math.PI*2);
    C.fillStyle = '#ffb7c5';C.fill();
    C.strokeStyle = '#4a2a2a';C.lineWidth = 1.2;C.stroke();
    C.save();C.translate(ex, ey);C.rotate(ang+0.5);
    C.fillStyle = '#1a237e';C.fillRect(-2,-16,4,16);
    C.fillStyle = '#3949ab';C.fillRect(-2,-16,4,8);
    C.fillStyle = '#1a1a1a';C.fillRect(-1,-2,2,6);
    C.restore();
  } else if(M.angry){
    C.beginPath();C.ellipse(armX+2, armY-10+armBob, 8, 6, 0.5, 0, Math.PI*2);
    C.fillStyle = '#ffb7c5';C.fill();C.strokeStyle='#4a2a2a';C.lineWidth=1.2;C.stroke();
  } else {
    C.beginPath();C.ellipse(armX, armY+armBob, 8, 6, 0.2, 0, Math.PI*2);
    C.fillStyle = '#ffb7c5';C.fill();C.strokeStyle='#4a2a2a';C.lineWidth=1.2;C.stroke();
  }


  // HAIR CURL (forehead swirl) – stays centered
  C.save();
  C.translate(0, -bodyH/2+4);
  C.beginPath();
  C.moveTo(-4, -2);
  C.bezierCurveTo(-10, -8, -8, -16, 0, -18);
  C.bezierCurveTo(8, -20, 12, -12, 6, -6);
  C.bezierCurveTo(2, -2, -2, -2, -4, -2);
  C.fillStyle = '#ffb7c5';C.fill();
  C.strokeStyle = '#4a2a2a';C.lineWidth = 1.5;C.stroke();
  C.restore();

  // EYES – large teal, scaled horizontally
  const eyeX = 12 * scaleFactor; // was 12
  // left eye
  C.save();
  C.translate(-eyeX, -8);
  C.beginPath();C.ellipse(0, 0, 10, 12, 0, 0, Math.PI*2);
  C.fillStyle = '#ffffff';C.fill();C.strokeStyle='#4a2a2a';C.lineWidth=1;C.stroke();
  const eyeGrad = C.createRadialGradient(-2, -2, 2, 0, 0, 7);
  eyeGrad.addColorStop(0, '#40e0d0'); eyeGrad.addColorStop(0.7, '#008b8b'); eyeGrad.addColorStop(1, '#006666');
  C.beginPath();C.ellipse(0, 0, 7, 9, 0, 0, Math.PI*2);
  C.fillStyle = eyeGrad;C.fill();C.strokeStyle='#4a2a2a';C.lineWidth=1;C.stroke();
  C.beginPath();C.ellipse(0, 1, 4, 5, 0, 0, Math.PI*2);
  C.fillStyle = '#1a1a1a';C.fill();
  C.beginPath();C.arc(-3, -3, 2, 0, Math.PI*2);C.fillStyle='white';C.fill();
  C.beginPath();C.arc(2, 0, 1.2, 0, Math.PI*2);C.fillStyle='rgba(255,255,255,0.8)';C.fill();
  C.restore();

  // right eye
  C.save();
  C.translate(eyeX, -8);
  C.beginPath();C.ellipse(0, 0, 10, 12, 0, 0, Math.PI*2);
  C.fillStyle = '#ffffff';C.fill();C.strokeStyle='#4a2a2a';C.lineWidth=1;C.stroke();
  const eyeGrad2 = C.createRadialGradient(-2, -2, 2, 0, 0, 7);
  eyeGrad2.addColorStop(0, '#40e0d0'); eyeGrad2.addColorStop(0.7, '#008b8b'); eyeGrad2.addColorStop(1, '#006666');
  C.beginPath();C.ellipse(0, 0, 7, 9, 0, 0, Math.PI*2);
  C.fillStyle = eyeGrad2;C.fill();C.strokeStyle='#4a2a2a';C.lineWidth=1;C.stroke();
  C.beginPath();C.ellipse(0, 1, 4, 5, 0, 0, Math.PI*2);
  C.fillStyle = '#1a1a1a';C.fill();
  C.beginPath();C.arc(-3, -3, 2, 0, Math.PI*2);C.fillStyle='white';C.fill();
  C.beginPath();C.arc(2, 0, 1.2, 0, Math.PI*2);C.fillStyle='rgba(255,255,255,0.8)';C.fill();
  C.restore();

  // MOUTH (and angry brows)
  C.save();
  C.translate(0, 2);
  if(M.singing){
    C.beginPath();C.ellipse(0, 12, 8, 6, 0, 0, Math.PI*2);
    C.fillStyle = '#ff8a80';C.fill();C.strokeStyle='#4a2a2a';C.lineWidth=1;C.stroke();
    C.beginPath();C.ellipse(0, 16, 5, 3, 0, 0, Math.PI*2);
    C.fillStyle = '#ff6b6b';C.fill();
  } else if(M.angry){
    C.beginPath();C.moveTo(-6, 14);C.quadraticCurveTo(0, 8, 6, 14);
    C.strokeStyle = '#4a2a2a';C.lineWidth=2;C.lineCap='round';C.stroke();
    C.strokeStyle = '#4a2a2a';C.lineWidth=2;
    C.beginPath();C.moveTo(-16, -18);C.lineTo(-8, -14);C.stroke();
    C.beginPath();C.moveTo(16, -18);C.lineTo(8, -14);C.stroke();
  } else {
    C.beginPath();C.moveTo(-6, 12);C.quadraticCurveTo(0, 16, 6, 12);
    C.strokeStyle = '#4a2a2a';C.lineWidth=1.5;C.lineCap='round';C.stroke();
  }
  C.restore();

  // blush (scaled horizontally)
  if(B.blush){
    const blushX = 18 * scaleFactor; // was 18
    C.beginPath();C.ellipse(-blushX, 2, 5, 3, 0, 0, Math.PI*2);
    C.fillStyle = 'rgba(255,100,130,0.2)';C.fill();
    C.beginPath();C.ellipse(blushX, 2, 5, 3, 0, 0, Math.PI*2);
    C.fillStyle = 'rgba(255,100,130,0.2)';C.fill();
  }

  C.restore(); // restore from tilt/translate

  // Scribbles are drawn on the fullscreen overlay window (not here)
  // This prevents them being clipped to the 220x220 pet canvas
}
// ═══════════════════════════════════════════
// DRAW PIKACHU
// ═══════════════════════════════════════════
function drawPikachu(cx,cy) {
  const t=tick, jy=M.jumping?M.jumpY:0, by=cy-jy;
  const br=Math.sin(M.breathPhase)*1.2;
  const yel='#ffcc02', dyel='#e6b800', brn='#8B4513';
  const face=pikachuFaceTimer>0?pikachuFace:'normal';

  // Lightning drawn on fullscreen overlay (not clipped to pet canvas)

  // shadow
  C.beginPath();C.ellipse(cx,by+52,20,4,0,0,Math.PI*2);C.fillStyle='rgba(0,0,0,0.12)';C.fill();

  // tail (zigzag lightning bolt shape) - adjusted position slightly for slimmer body
  C.save();C.translate(cx+18, by+20); // was +20
  C.beginPath();C.moveTo(0,0);C.lineTo(8,-8);C.lineTo(4,-4);C.lineTo(12,-16);C.lineTo(8,-12);C.lineTo(16,-22);
  C.strokeStyle=dyel;C.lineWidth=8;C.lineCap='round';C.lineJoin='round';C.stroke();
  C.strokeStyle='#f9a825';C.lineWidth=4;C.stroke();
  C.restore();

  // ears (black tips)

function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    C.globalAlpha=p.life/p.maxLife;
    if(p.type==='heart') drawHeart(p.x,p.y,p.size*p.life/p.maxLife,'#ff69b4');
    else if(p.type==='star') drawStar(p.x,p.y,p.size*p.life/p.maxLife,p.rot||0);
    else if(p.type==='text'){
      C.font=`bold ${p.size}px sans-serif`;
      C.fillStyle='#c4b0ff';
      C.fillText(p.ch,p.x,p.y);
    } else if(p.type==='tear'){
      C.beginPath();
      C.moveTo(p.x,p.y);
      C.bezierCurveTo(p.x-p.size,p.y+p.size*1.5,p.x+p.size,p.y+p.size*1.5,p.x,p.y+p.size*3);
      C.fillStyle='rgba(150,200,255,0.8)';C.fill();
    }
    p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life--;
    if(p.type==='star')p.rot=(p.rot||0)+.08;
  });
  C.globalAlpha=1;
}

function pickTarget(){
  const p=currentPet,mg=20;
  if(p==='lizard'){
    const r=Math.random();
    if(r<.35) return clampTarget(-PET_ANCHOR_X, mg+Math.random()*(sh*.65));
    if(r<.65) return clampTarget(sw-PET_ANCHOR_X, mg+Math.random()*(sh*.65));
    if(r<.8) return clampTarget(mg+Math.random()*(sw-(mg*2)), -PET_ANCHOR_Y);
    return clampTarget(mg+Math.random()*(sw-(mg*2)), sh-PET_ANCHOR_Y);
  }
  if(p==='snake') return clampTarget(mg+Math.random()*(sw-(mg*2)), mg+Math.random()*(sh-(mg*2)));
  if(p==='unicorn') return clampTarget(mg+Math.random()*(sw-(mg*2)), sh-PET_ANCHOR_Y-Math.random()*40);
  return clampTarget(mg+Math.random()*(sw-(mg*2)), sh-PET_ANCHOR_Y);
}
function updateMovement(){
  if(M.sleeping||M.howling) return;
  if(Date.now() < manualMoveHoldUntil) return;
  if(orbitActive) return; // orbit overrides movement

  // Cat chases pixel mouse
  if(currentPet==='cat' && pixelMouse && B.mouse){
    const dx = pixelMouse.x - petCenterX();
    const dy = pixelMouse.y - petCenterY();
    if(Math.sqrt(dx*dx+dy*dy)>8){
      M.facing=dx>0?1:-1;
      moveWin(wx + Math.sign(dx || 1) * 2.2, wy + Math.sign(dy || 1) * 1.3);
      M.legPhase+=.15; M.mood='run';
      return;
    }
  }
  // Cat plays with yarn ball
  if(currentPet==='cat' && B.yarn && yarnBalls.length){
    let closest = null;
    let closestD = 1e9;
    yarnBalls.forEach(b => {
      const dx = b.x - petCenterX();
      const dy = b.y - petCenterY();
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < closestD){ closestD = d; closest = b; }
    });
    if(closest && closestD > 10){
      M.tx = closest.x - PET_ANCHOR_X;
      M.ty = closest.y - PET_ANCHOR_Y;
      M.mood = closestD > 80 ? 'run' : 'walk';
      const dx = M.tx - wx;
      M.facing = dx > 0 ? 1 : -1;
    }
    return;
  }
  // Pikachu chases ketchup bottle
  if(currentPet==='pikachu' && B.ketchup && ketchup){
    const dx = ketchup.x - petCenterX();
    const dy = ketchup.y - petCenterY();
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > 10){
      M.tx = ketchup.x - PET_ANCHOR_X;
      M.ty = ketchup.y - PET_ANCHOR_Y;
      M.mood = dist > 90 ? 'run' : 'walk';
      M.facing = dx > 0 ? 1 : -1;
    }
    return;
  }
  if(M.tx!==null&&M.ty!==null){
    const dx=M.tx-wx,dy=M.ty-wy,dist=Math.sqrt(dx*dx+dy*dy),spd=M.mood==='run'?2.8:1.6;
    if(dist>4){M.facing=dx>0?1:-1;moveWin(wx+dx/dist*spd,wy+dy/dist*spd);M.legPhase+=M.mood==='run'?.2:.12;}
    else{moveWin(M.tx,M.ty);M.tx=null;M.ty=null;M.mood='idle';if(Math.random()<.3&&currentPet==='cat'&&B.scratch){M.scratching=true;M.scratchTimer=60+Math.random()*40;}if(Math.random()<.2&&currentPet==='dog'&&B.howl){M.howling=true;M.howlTimer=80;showBubble('AWOOOOOO 🌕');}}
  }
  if(--M.walkTimer<=0&&M.tx===null){
    M.walkTimer=130+Math.random()*240;
    const t=pickTarget();M.tx=t.tx;M.ty=t.ty;M.mood=Math.random()<.38?'run':'walk';
    if(currentPet==='lizard'&&Math.random()<.3&&bugs.length<3&&B.bugs)spawnBug();
    if(currentPet==='snake'&&Math.random()<.25&&humans.length<2&&B.humans)spawnHuman();
    if(currentPet==='snake'&&Math.random()<.12&&!orbitActive&&B.orbit)startOrbit();
    if(currentPet==='unicorn'&&Math.random()<.18&&B.rainbow)triggerRainbow();
    if(currentPet==='unicorn'&&Math.random()<.2&&!cupcake&&B.cupcake)spawnCupcake();
    if(currentPet==='cat'&&Math.random()<.2&&B.yarn)spawnYarnBall();
    if(currentPet==='cat'&&Math.random()<.25&&!pixelMouse&&B.mouse)spawnPixelMouse();
    if(currentPet==='dog'&&Math.random()<.15&&!mug&&!dogInMug&&B.mug)spawnMug();
    if(currentPet==='jigglypuff'&&Math.random()<.35&&B.sing){M.singing=true;M.singTimer=150;showBubble(['♪ jigglypuff~ ♪','♫ laa la la~ ♫','♬ sing along! ♬'][Math.floor(Math.random()*3)],3000);}
    if(currentPet==='pikachu'&&Math.random()<.2&&B.faces){pikachuFace=['overwhelmed','smug','determined','happy','derp'][Math.floor(Math.random()*5)];pikachuFaceTimer=100;}
    if(currentPet==='pikachu'&&Math.random()<.15&&B.ketchup)spawnKetchup();
  }
}
function updateBugs(){bugs.forEach((b,i)=>{if(b.dead){b.life--;if(b.life<=0)bugs.splice(i,1);return;}b.x+=b.vx+(Math.random()-.5)*.5;b.y+=b.vy+(Math.random()-.5)*.5;b.y=Math.max(20,Math.min(screenFloorY()-20,b.y));b.life--;if(b.life<=0||b.x<-30||b.x>sw+30)bugs.splice(i,1);const dx=b.x-petCenterX(),dy=b.y-petCenterY();if(Math.sqrt(dx*dx+dy*dy)<30&&currentPet==='lizard'){b.dead=true;M.eating=true;M.eatTimer=40;showBubble('*SNAP* 🦟 yum!');spawnP('star',3);}});}
function updateHumans(){humans.forEach((h,i)=>{if(h.eaten){h.life--;if(h.life<=0)humans.splice(i,1);return;}h.x+=h.vx;h.life--;if(h.life<=0||h.x<-40||h.x>sw+40)humans.splice(i,1);const dx=h.x-petCenterX(),dy=h.y-petCenterY();if(Math.sqrt(dx*dx+dy*dy)<35&&currentPet==='snake'){h.eaten=true;M.eating=true;M.eatTimer=120;showBubble('*GULP* ...burp 🤢');setTimeout(()=>{M.eating=false;humans.push({x:petCenterX()+(M.facing*60),y:screenFloorY(),vx:M.facing*3,life:200,eaten:false,legPhase:0});showBubble('BLEEEH 🤮');},3000);}});}
function updateBone(){
  if(!bone) return;
  if(!bone.landed){
    bone.x+=bone.vx; bone.y+=bone.vy; bone.vy+=.45; bone.angle+=bone.spin;
    if(bone.x<5||bone.x>sw-5){bone.vx*=-.7;}
    if(bone.y>=screenFloorY()){bone.y=screenFloorY();bone.vy*=-.45;bone.vx*=.8;
      if(Math.abs(bone.vy)<.5){bone.landed=true;bone.vy=0;bone.vx=0;
        M.tx=bone.x-PET_ANCHOR_X; M.ty=bone.y-PET_ANCHOR_Y; M.mood='run';
        showBubble('*zoom* 🐕💨');
      }
    }
  } else if(bone.returning){
    const destX = bone.returnWX || cursorX;
    const destY = bone.returnWY || cursorY;
    const dx=destX-bone.x, dy=destY-bone.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d>6){bone.x+=dx/d*5;bone.y+=dy/d*5;bone.angle+=.12;}
    else{bone=null;M.fetching=false;showBubble('*drops bone at cursor* ♥');spawnP('heart',3);}
  } else {
    const dx = bone.x - petCenterX();
    const dy = bone.y - petCenterY();
    if(Math.sqrt(dx*dx + dy*dy) < 50){
      bone.returning=true;
      bone.returnWX=cursorX; bone.returnWY=cursorY;
      showBubble('*got it!* 🦴');
      M.tx=null; M.ty=null;
    }
  }
}
function updateYarnBalls(){yarnBalls=yarnBalls.filter(b=>b.life>0);yarnBalls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=.3;if(b.y>=screenFloorY()){b.y=screenFloorY();b.vy*=-.6;b.vx*=.85;}if(b.x<0||b.x>sw)b.vx*=-1;b.life--;});if(currentPet==='cat'&&B.yarn){yarnBalls.forEach(b=>{const dx=b.x-petCenterX(),dy=b.y-petCenterY();const d=Math.sqrt(dx*dx+dy*dy);if(d<35){b.vx+=Math.sign(dx)*1.2;b.vy-=1.4;}});}}
function updateRainbow(){rainbowPuke=rainbowPuke.filter(p=>p.life>0);rainbowPuke.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;});if(M.rainbowTimer>0){M.rainbowTimer--;if(M.rainbowTimer===0)M.rainbowing=false;}}
function updateMusicNotes(){musicNotes=musicNotes.filter(n=>n.life>0);musicNotes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.life--;});}
function updateLightnings(){lightnings=lightnings.filter(l=>l.life>0);lightnings.forEach(l=>l.life--);}
function updateScribbles(){
  if(currentPet!=='jigglypuff') return;

  // Animate scribbles being drawn in (increment drawn count)
  scribbles.forEach(s=>{
    if(s.drawn < s.pts.length) s.drawn = Math.min(s.pts.length, s.drawn + 1.2);
  });

  // Fade out non-permanent scribbles (after mic returned)
  scribbles.forEach(s=>{ if(!s.permanent){ s.fade=(s.fade||1)-.03; } });
  scribbles = scribbles.filter(s=>s.permanent||(s.fade||1)>0);

  if(!M.scribbling) return;

  // Walking to scribble spot
  if(M.scribbleWalking && M.scribbleTarget){
    const targetWX = M.scribbleTarget.x - PET_ANCHOR_X;
    const targetWY = M.scribbleTarget.y - PET_ANCHOR_Y;
    const dx=targetWX-wx, dy=targetWY-wy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>8){
      M.facing=dx>0?1:-1;
      moveWin(wx+dx/dist*2.2, wy+dy/dist*2.2);
      M.legPhase+=.15; M.mood='walk';
    } else {
      // Arrived — start drawing
      M.scribbleWalking=false;
      M.scribbleTarget=null;
      M.penDown=true;
      addJigglyScribbleAtCurrentSpot();
      setTimeout(()=>{
        if(M.scribbling) {
          M.penDown = false;
          scheduleJigglyScribbleLoop(80);
        }
      }, 900);
    }
  }
  else if(M.scribbling && !M.penDown && !M.scribbleTarget){
    scheduleJigglyScribbleLoop(80);
  }
}function updateKetchup(){if(!ketchup)return;ketchup.x+=ketchup.vx;ketchup.life--;if(ketchup.life<=0||ketchup.x<-40||ketchup.x>sw+40)ketchup=null;const dx=ketchup?ketchup.x-petCenterX():999,dy=ketchup?ketchup.y-petCenterY():999;if(ketchup&&Math.sqrt(dx*dx+dy*dy)<40){ketchup=null;showBubble('KETCHUP!! ⚡ pika!');spawnP('star',5);pikachuFace='happy';pikachuFaceTimer=100;}}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function update(){
  tick++;
  C.clearRect(0,0,220,220);
  M.breathPhase+=.04;
  // Happy bounce — extra body bob
  const bounceMod = M.bouncing ? Math.abs(Math.sin(tick*0.25))*6 : 0;
  M.tailAngle=Math.sin(tick*(M.howling?.12:.035)*28)*(M.sleeping?.18:.55)+.38;
  if(--M.blinkTimer<=0){M.eyeOpen=!M.eyeOpen;M.blinkTimer=M.eyeOpen?(90+Math.random()*120):7;}
  if(M.jumping){M.jumpY+=M.jumpVY;M.jumpVY+=.85;if(M.jumpY<=0){M.jumpY=0;M.jumping=false;M.jumpVY=0;}}
  if(M.purrTimer>0&&--M.purrTimer===0)M.purring=false;
  if(M.scratchTimer>0&&--M.scratchTimer===0)M.scratching=false;
  if(M.yawnTimer>0&&--M.yawnTimer===0)M.yawning=false;
  if(M.eatTimer>0)M.eatTimer--;
  if(M.howlTimer>0){M.howlTimer--;if(M.howlTimer===0)M.howling=false;}
  if(M.hissTimer>0){M.hissTimer--;if(M.hissTimer===0)M.hissing=false;}
  if(M.singTimer>0){M.singTimer--;if(M.singTimer===0)M.singing=false;else if(tick%12===0)spawnMusicNote();}
  // angryTimer removed — angry state now controlled by M key hold/release
  if(M.thunderTimer>0){M.thunderTimer--;if(M.thunderTimer===0)M.thundering=false;}
  if(pikachuFaceTimer>0)pikachuFaceTimer--;

  // LLM animation timers
  if(llmThinking) thinkTimer++;
  if(M.bounceTimer>0){M.bounceTimer--;if(M.bounceTimer===0)M.bouncing=false;}
  if(M.droopTimer>0){M.droopTimer--;if(M.droopTimer===0)M.drooping=false;}
  if(M.llmJumpTimer>0) M.llmJumpTimer--;

  // Auto-reaction timer
  autoReactTimer--;
  if(M.mood==='idle'||M.mood==='walk') idleTimer++;
  else idleTimer=0;
  // Trigger if idle for a while or when the random autonomous timer fires
  if((idleTimer>600 && tick-lastAutoReact>800) || (autoReactTimer<=0)) {
    autoReactTimer = 1400 + Math.floor(Math.random()*1400);
    lastAutoReact = tick;
    idleTimer = 0;
    if(canAutonomouslyAct()) triggerAutonomousAI();
  }

  updateMovement();updateBugs();updateHumans();updateBone();
  updateYarnBalls();updateRainbow();updateMusicNotes();
  updateLightnings();updateScribbles();updateKetchup();
  updatePixelMouse();updateMug();updateCupcake();
  if(orbitActive)updateOrbit();

  if(tick%300===0){M.happiness=Math.max(0,M.happiness-2);M.hunger=Math.max(0,M.hunger-1.5);M.energy=Math.max(0,M.energy-1);}

  const cx=110,cy=130;
  if(currentPet==='cat'){drawCat(cx,cy);}
  else if(currentPet==='dog'){drawDog(cx,cy);}
  else if(currentPet==='lizard')drawLizard(cx,cy);
  else if(currentPet==='snake')drawSnake(cx,cy);
  else if(currentPet==='unicorn'){drawUnicorn(cx,cy);}
  else if(currentPet==='jigglypuff')drawJigglypuff(cx,cy);
  else if(currentPet==='pikachu')drawPikachu(cx,cy);

  drawParticles();

  // ── LLM THINKING DOTS (drawn over everything in pet canvas) ──────────────
  if(llmThinking){
    const dotY = 18;
    const dotX = 110;
    const phase = thinkTimer * 0.12;
    [0,1,2].forEach(i=>{
      const y = dotY - Math.abs(Math.sin(phase + i*0.7))*8;
      C.beginPath(); C.arc(dotX-10+i*10, y, 3.5, 0, Math.PI*2);
      C.fillStyle=`rgba(180,140,255,${0.5+Math.abs(Math.sin(phase+i*0.7))*0.5})`;
      C.fill();
    });
    // Question marks floating up
    if(thinkTimer%40===0){
      particles.push({type:'text',ch:['?','...','~','?!'][Math.floor(Math.random()*4)],
        x:90+Math.random()*40, y:60, vx:(Math.random()-.5)*1, vy:-0.8,
        life:50, maxLife:50, size:12});
    }
  }

  // ── SAD DROOP overlay ──────────────────────────────────────────────────────
  if(M.drooping){
    const alpha = Math.min(1, M.droopTimer/60)*0.3;
    C.globalAlpha=alpha;
    // Blue tint over pet
    C.fillStyle='rgba(100,150,255,0.15)';
    C.fillRect(60,40,100,140);
    // Tear drops
    if(thinkTimer%20===0&&M.droopTimer>60){
      particles.push({type:'tear',x:95+Math.random()*30,y:90,vx:(Math.random()-.5)*0.5,vy:1.5,life:40,maxLife:40,size:4});
    }
    C.globalAlpha=1;
  }

  // Send scribbles + lightning + rainbow to fullscreen overlay every frame
  sendOverlay();

  requestAnimationFrame(update);
}

refreshScreen().then(()=>{moveWin(sw/2-PET_ANCHOR_X,sh-PET_ANCHOR_Y);});
update();
</script>
