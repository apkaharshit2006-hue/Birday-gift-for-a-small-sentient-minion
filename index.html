        function drawPerson(cx, cy) {
            const flip = M.facing === -1;
            const jy = M.jumping ? M.jumpY : 0;
            const by = cy - jy;

            C.save();
            C.translate(cx, by);
            if (flip) C.scale(-1, 1);

            // DEBUG BOX (Neon Green) - Only for troubleshooting
            C.fillStyle = "rgba(0, 255, 0, 0.4)";
            C.fillRect(-80, -160, 160, 160);
            C.strokeStyle = "#00ff00";
            C.lineWidth = 2;
            C.strokeRect(-80, -160, 160, 160);

            // DEBUG TEXT
            C.save();
            if (flip) C.scale(-1, 1); // Flip back for readable text
            C.font = "bold 12px monospace";
            C.fillStyle = "#00ff00";
            C.fillText("V2 - ACTIVE", -70, -155);
            C.fillText(`PET: ${currentPet}`, -70, -170);
            C.fillText(`IMG: ${personCurrentImage}`, -70, -185);
            C.restore();

            // Use current image (0 or 1)
            let img = personImages[personCurrentImage];
            const isMoody = personCurrentImage === 1;

            // Draw image scaled to fit pet window while maintaining aspect ratio
            const sz = 160;
            if (!img.complete || img.naturalWidth === 0) {
                // Fallback to a simple circle if image is not loaded
                C.fillStyle = "rgba(180, 140, 255, 0.4)";
                C.beginPath();
                C.arc(0, -sz / 2, 40, 0, Math.PI * 2);
                C.fill();
                C.restore();
                return;
            }

            const aspect = img.naturalWidth / img.naturalHeight;
            if (isMoody) {
                // Image 2 rotation (horizontal to vertical)
                C.translate(0, -sz / 2);
                C.rotate(Math.PI / 2);
                // After rotation, aspect is inverted relative to drawing area
                const drawW = sz * aspect;
                const drawH = sz;
                C.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
            } else {
                // Image 1 is upright
                const drawW = sz * aspect;
                const drawH = sz;
                C.drawImage(img, -drawW / 2, -drawH, drawW, drawH);
            }

            C.restore();
        }
        // ═══════════════════════════════════════════
        // PARTICLES DRAW
        // ═══════════════════════════════════════════
        function drawParticles() {
            particles = particles.filter((p) => p.life > 0);
            particles.forEach((p) => {
                C.globalAlpha = p.life / p.maxLife;
                if (p.type === "heart")
                    drawHeart(
                        p.x,
                        p.y,
                        (p.size * p.life) / p.maxLife,
                        "#ff69b4",
                    );
                else if (p.type === "star")
                    drawStar(
                        p.x,
                        p.y,
                        (p.size * p.life) / p.maxLife,
                        p.rot || 0,
                    );
                else if (p.type === "text") {
                    C.font = `bold ${p.size}px sans-serif`;
                    C.fillStyle = "#c4b0ff";
                    C.fillText(p.ch, p.x, p.y);
                } else if (p.type === "tear") {
                    C.beginPath();
                    C.moveTo(p.x, p.y);
                    C.bezierCurveTo(
                        p.x - p.size,
                        p.y + p.size * 1.5,
                        p.x + p.size,
                        p.y + p.size * 1.5,
                        p.x,
                        p.y + p.size * 3,
                    );
                    C.fillStyle = "rgba(150,200,255,0.8)";
                    C.fill();
                }
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04;
                p.life--;
                if (p.type === "star") p.rot = (p.rot || 0) + 0.08;
            });
            C.globalAlpha = 1;
        }

        // ═══════════════════════════════════════════
        // MOVEMENT
        // ═══════════════════════════════════════════
        function pickTarget() {
            const p = currentPet,
                mg = 20;
            if (p === "lizard") {
                const r = Math.random();
                if (r < 0.35)
                    return clampTarget(
                        -PET_ANCHOR_X,
                        mg + Math.random() * (sh * 0.65),
                    );
                if (r < 0.65)
                    return clampTarget(
                        sw - PET_ANCHOR_X,
                        mg + Math.random() * (sh * 0.65),
                    );
                if (r < 0.8)
                    return clampTarget(
                        mg + Math.random() * (sw - mg * 2),
                        -PET_ANCHOR_Y,
                    );
                return clampTarget(
                    mg + Math.random() * (sw - mg * 2),
                    sh - PET_ANCHOR_Y,
                );
            }
            if (p === "snake")
                return clampTarget(
                    mg + Math.random() * (sw - mg * 2),
                    mg + Math.random() * (sh - mg * 2),
                );
            if (p === "unicorn")
                return clampTarget(
                    mg + Math.random() * (sw - mg * 2),
                    sh - PET_ANCHOR_Y - Math.random() * 40,
                );
            return clampTarget(
                mg + Math.random() * (sw - mg * 2),
                sh - PET_ANCHOR_Y,
            );
        }
        function updateMovement() {
            if (M.sleeping || M.howling) return;
            if (Date.now() < manualMoveHoldUntil) return;
            if (orbitActive) return; // orbit overrides movement
            if (M.inGame) {
                if (M.tx !== null && M.ty !== null) {
                    const dx = M.tx - wx,
                        dy = M.ty - wy,
                        dist = Math.sqrt(dx * dx + dy * dy),
                        spd = M.mood === "run" ? 2.8 : 1.6;
                    if (dist > 4) {
                        M.facing = dx > 0 ? 1 : -1;
                        moveWin(
                            wx + (dx / dist) * spd,
                            wy + (dy / dist) * spd,
                        );
                        M.legPhase += M.mood === "run" ? 0.2 : 0.12;
                    } else {
                        moveWin(M.tx, M.ty);
                        M.tx = null;
                        M.ty = null;
                        M.mood = "idle";
                    }
                }
                return;
            }

            // Cat chases pixel mouse
            if (currentPet === "cat" && pixelMouse && B.mouse) {
                const dx = pixelMouse.x - petCenterX();
                const dy = pixelMouse.y - petCenterY();
                if (Math.sqrt(dx * dx + dy * dy) > 8) {
                    M.facing = dx > 0 ? 1 : -1;
                    moveWin(
                        wx + Math.sign(dx || 1) * 2.2,
                        wy + Math.sign(dy || 1) * 1.3,
                    );
                    M.legPhase += 0.15;
                    M.mood = "run";
                    return;
                }
            }
            // Cat plays with yarn ball
            if (currentPet === "cat" && B.yarn && yarnBalls.length) {
                let closest = null;
                let closestD = 1e9;
                yarnBalls.forEach((b) => {
                    const dx = b.x - petCenterX();
                    const dy = b.y - petCenterY();
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < closestD) {
                        closestD = d;
                        closest = b;
                    }
                });
                if (closest && closestD > 10) {
                    M.tx = closest.x - PET_ANCHOR_X;
                    M.ty = closest.y - PET_ANCHOR_Y;
                    M.mood = closestD > 80 ? "run" : "walk";
                    const dx = M.tx - wx;
                    M.facing = dx > 0 ? 1 : -1;
                }
                return;
            }
            // Pikachu chases ketchup bottle
            if (currentPet === "pikachu" && B.ketchup && ketchup) {
                const dx = ketchup.x - petCenterX();
                const dy = ketchup.y - petCenterY();
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 10) {
                    M.tx = ketchup.x - PET_ANCHOR_X;
                    M.ty = ketchup.y - PET_ANCHOR_Y;
                    M.mood = dist > 90 ? "run" : "walk";
                    M.facing = dx > 0 ? 1 : -1;
                }
                return;
            }
            if (M.tx !== null && M.ty !== null) {
                const dx = M.tx - wx,
                    dy = M.ty - wy,
                    dist = Math.sqrt(dx * dx + dy * dy),
                    spd = M.mood === "run" ? 2.8 : 1.6;
                if (dist > 4) {
                    M.facing = dx > 0 ? 1 : -1;
                    moveWin(wx + (dx / dist) * spd, wy + (dy / dist) * spd);
                    M.legPhase += M.mood === "run" ? 0.2 : 0.12;
                } else {
                    moveWin(M.tx, M.ty);
                    M.tx = null;
                    M.ty = null;
                    M.mood = "idle";
                    if (
                        Math.random() < 0.3 &&
                        currentPet === "cat" &&
                        B.scratch
                    ) {
                        M.scratching = true;
                        M.scratchTimer = 60 + Math.random() * 40;
                    }
                    if (
                        Math.random() < 0.2 &&
                        currentPet === "dog" &&
                        B.howl
                    ) {
                        M.howling = true;
                        M.howlTimer = 80;
                        showBubble("AWOOOOOO 🌕");
                    }
                }
            }
            if (--M.walkTimer <= 0 && M.tx === null) {
                M.walkTimer = 130 + Math.random() * 240;
                const t = pickTarget();
                M.tx = t.tx;
                M.ty = t.ty;
                M.mood = Math.random() < 0.38 ? "run" : "walk";
                if (
                    currentPet === "lizard" &&
                    Math.random() < 0.3 &&
                    bugs.length < 3 &&
                    B.bugs
                )
                    spawnBug();
                if (
                    currentPet === "snake" &&
                    Math.random() < 0.25 &&
                    humans.length < 2 &&
                    B.humans
                )
                    spawnHuman();
                if (
                    currentPet === "snake" &&
                    Math.random() < 0.12 &&
                    !orbitActive &&
                    B.orbit
                )
                    startOrbit();
                if (
                    currentPet === "unicorn" &&
                    Math.random() < 0.18 &&
                    B.rainbow
                )
                    triggerRainbow();
                if (
                    currentPet === "unicorn" &&
                    Math.random() < 0.2 &&
                    !cupcake &&
                    B.cupcake
                )
                    spawnCupcake();
                if (currentPet === "cat" && Math.random() < 0.2 && B.yarn)
                    spawnYarnBall();
                if (
                    currentPet === "cat" &&

                    B.mouse

                    spawnPixelMouse();
                if (
                    currentPet === "dog" &&
                    Math.random() < 0.15 &&
                    !mug &&
                    !dogInMug &&
                    B.mug
                )
                    spawnMug();
                if (
                    currentPet === "jigglypuff" &&
                    Math.random() < 0.35 &&
                    B.sing
                ) {
                    M.singing = true;
                    M.singTimer = 150;
                    showBubble(
                        [
                            "♪ jigglypuff~ ♪",
                            "♫ laa la la~ ♫",
                            "♬ sing along! ♬",
                        ][Math.floor(Math.random() * 3)],
                        3000,
                    );
                }
                if (
                    currentPet === "pikachu" &&
                    Math.random() < 0.2 &&
                    B.faces
                ) {
                    pikachuFace = [
                        "overwhelmed",
                        "smug",
                        "determined",
                        "happy",
                        "derp",
                    ][Math.floor(Math.random() * 5)];
                    pikachuFaceTimer = 100;
                }
                if (
                    currentPet === "pikachu" &&
                    Math.random() < 0.15 &&
                    B.ketchup
                )
                    spawnKetchup();
            }
        }
        function updateBugs() {
            if (M.inGame && Game.active === "lizard") {
                for (let i = bugs.length - 1; i >= 0; i--) {
                    const b = bugs[i];
                    if (b.dead) {
                        b.life--;
                        if (b.life <= 0) bugs.splice(i, 1);
                        continue;
                    }
                    if (b.stunned) {
                        b.stunTimer--;
                        if (b.stunTimer <= 0) {
                            b.dead = true;
                            b.life = 8;
                            M.gameScore += 1;
                            spawnP("star", 2);
                        }
                        continue;
                    }
                    b.x += b.vx + (Math.random() - 0.5) * 1.2;
                    b.y += b.vy + (Math.random() - 0.5) * 1.2;
                    if (b.x < 10 || b.x > sw - 10) b.vx *= -1;
                    if (b.y < 20 || b.y > sh - 20) b.vy *= -1;
                    if (
                        Math.hypot(
                            Game.pointer.x - b.x,
                            Game.pointer.y - b.y,
                        ) < 18
                    ) {
                        b.stunned = true;
                        b.stunTimer = 12;
                        Game.state.tongue = {
                            sx: petCenterX(),
                            sy: petCenterY(),
                            ex: b.x,
                            ey: b.y,
                            life: 12,
                        };
                        M.eating = true;
                        M.eatTimer = 30;
                    }
                }
                return;
            }
            bugs.forEach((b, i) => {
                if (b.dead) {
                    b.life--;
                    if (b.life <= 0) bugs.splice(i, 1);
                    return;
                }
                b.x += b.vx + (Math.random() - 0.5) * 0.5;
                b.y += b.vy + (Math.random() - 0.5) * 0.5;
                b.y = Math.max(20, Math.min(screenFloorY() - 20, b.y));
                b.life--;
                if (b.life <= 0 || b.x < -30 || b.x > sw + 30)
                    bugs.splice(i, 1);
                const dx = b.x - petCenterX(),
                    dy = b.y - petCenterY();
                if (
                    Math.sqrt(dx * dx + dy * dy) < 30 &&
                    currentPet === "lizard"
                ) {
                    b.dead = true;
                    M.eating = true;
                    M.eatTimer = 40;
                    showBubble("*SNAP* 🦟 yum!");
                    spawnP("star", 3);
                }
            });
        }
        function updateHumans() {
            humans.forEach((h, i) => {
                if (h.eaten) {
                    h.life--;
                    if (h.life <= 0) humans.splice(i, 1);
                    return;
                }
                h.x += h.vx;
                h.life--;
                if (h.life <= 0 || h.x < -40 || h.x > sw + 40)
                    humans.splice(i, 1);
                const dx = h.x - petCenterX(),
                    dy = h.y - petCenterY();
                if (
                    Math.sqrt(dx * dx + dy * dy) < 35 &&
                    currentPet === "snake"
                ) {
                    h.eaten = true;
                    M.eating = true;
                    M.eatTimer = 120;
                    showBubble("*GULP* ...burp 🤢");
                    setTimeout(() => {
                        M.eating = false;
                        humans.push({
                            x: petCenterX() + M.facing * 60,
                            y: screenFloorY(),
                            vx: M.facing * 3,
                            life: 200,
                            eaten: false,
                            legPhase: 0,
                        });
                        showBubble("BLEEEH 🤮");
                    }, 3000);
                }
            });
        }
        function updateBone() {
            if (!bone) return;
            if (!bone.landed) {
                bone.x += bone.vx;
                bone.y += bone.vy;
                bone.vy += 0.45;
                bone.angle += bone.spin;
                if (bone.x < 5 || bone.x > sw - 5) {
                    bone.vx *= -0.7;
                }
                if (bone.y >= screenFloorY()) {
                    bone.y = screenFloorY();
                    bone.vy *= -0.45;
                    bone.vx *= 0.8;
                    if (Math.abs(bone.vy) < 0.5) {
                        bone.landed = true;
                        bone.vy = 0;
                        bone.vx = 0;
                        M.tx = bone.x - PET_ANCHOR_X;
                        M.ty = bone.y - PET_ANCHOR_Y;
                        M.mood = "run";
                        showBubble("*zoom* 🐕💨");
                    }
                }
            } else if (bone.returning) {
                const destX = bone.returnWX || cursorX;
                const destY = bone.returnWY || cursorY;
                const dx = destX - bone.x,
                    dy = destY - bone.y,
                    d = Math.sqrt(dx * dx + dy * dy);
                if (d > 6) {
                    bone.x += (dx / d) * 5;
                    bone.y += (dy / d) * 5;
                    bone.angle += 0.12;
                } else {
                    bone = null;
                    M.fetching = false;
                    showBubble("*drops bone at cursor* ♥");
                    spawnP("heart", 3);
                }
            } else {
                const dx = bone.x - petCenterX();
                const dy = bone.y - petCenterY();
                if (Math.sqrt(dx * dx + dy * dy) < 50) {
                    bone.returning = true;
                    bone.returnWX = cursorX;
                    bone.returnWY = cursorY;
                    showBubble("*got it!* 🦴");
                    M.tx = null;
                    M.ty = null;
                }
            }
        }
        function updateYarnBalls() {
            yarnBalls = yarnBalls.filter((b) => b.life > 0);
            yarnBalls.forEach((b) => {
                b.x += b.vx;
                b.y += b.vy;
                b.vy += 0.3;
                if (b.y >= screenFloorY()) {
                    b.y = screenFloorY();
                    b.vy *= -0.6;
                    b.vx *= 0.85;
                }
                if (b.x < 0 || b.x > sw) b.vx *= -1;
                b.life--;
            });
            if (currentPet === "cat" && B.yarn) {
                yarnBalls.forEach((b) => {
                    const dx = b.x - petCenterX(),
                        dy = b.y - petCenterY();
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 35) {
                        b.vx += Math.sign(dx) * 1.2;
                        b.vy -= 1.4;
                    }
                });
            }
        }
        function updateRainbow() {
            rainbowPuke = rainbowPuke.filter((p) => p.life > 0);
            rainbowPuke.forEach((p) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life--;
            });
            if (M.rainbowTimer > 0) {
                M.rainbowTimer--;
                if (M.rainbowTimer === 0) M.rainbowing = false;
            }
        }
        function updateMusicNotes() {
            if (M.inGame && Game.active === "jigglypuff") {
                for (let i = musicNotes.length - 1; i >= 0; i--) {
                    const n = musicNotes[i];
                    n.x += n.vx;
                    n.y += n.vy;
                    if (n.y > sh - 20) {
                        musicNotes.splice(i, 1);
                        if (!Game.state.micRage) {
                            Game.state.miss = (Game.state.miss || 0) + 1;
                            if ((Game.state.miss || 0) >= 3)
                                triggerMicRage();
                        }
                    }
                }
                return;
            }
            musicNotes = musicNotes.filter((n) => n.life > 0);
            musicNotes.forEach((n) => {
                n.x += n.vx;
                n.y += n.vy;
                n.life--;
            });
        }
        function updateLightnings() {
            lightnings = lightnings.filter((l) => l.life > 0);
            lightnings.forEach((l) => l.life--);
        }
        function updateScribbles() {
            if (currentPet !== "jigglypuff") return;

            // Animate scribbles being drawn in (increment drawn count)
            scribbles.forEach((s) => {
                if (s.drawn < s.pts.length)
                    s.drawn = Math.min(s.pts.length, s.drawn + 1.2);
            });

            if (M.inGame && Game.active === "jigglypuff" && Game.state.micRage) {
                scribbles.forEach((s) => {
                    if (!s.wipeable) return;
                    if (!s.fade && s.fade !== 0) s.fade = 1;
                    const near = s.pts.some(
                        (p) =>
                            Math.hypot(
                                p.x - Game.pointer.x,
                                p.y - Game.pointer.y,
                            ) < 14,
                    );
                    if (near) s.fade = Math.max(0, s.fade - 0.08);
                });
                scribbles = scribbles.filter(
                    (s) => !s.wipeable || (s.fade || 0) > 0.02,
                );
                if (scribbles.length === 0) {
                    Game.state.micRage = false;
                    showBubble("...fine.", 2000);
                }
                return;
            }

            // Fade out non-permanent scribbles (after mic returned)
            scribbles.forEach((s) => {
                if (!s.permanent) {
                    s.fade = (s.fade || 1) - 0.03;
                }
            });
            scribbles = scribbles.filter(
                (s) => s.permanent || (s.fade || 1) > 0,
            );

            if (!M.scribbling) return;

            // Walking to scribble spot
            if (M.scribbleWalking && M.scribbleTarget) {
                const targetWX = M.scribbleTarget.x - PET_ANCHOR_X;
                const targetWY = M.scribbleTarget.y - PET_ANCHOR_Y;
                const dx = targetWX - wx,
                    dy = targetWY - wy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 8) {
                    M.facing = dx > 0 ? 1 : -1;
                    moveWin(wx + (dx / dist) * 2.2, wy + (dy / dist) * 2.2);
                    M.legPhase += 0.15;
                    M.mood = "walk";
                } else {
                    // Arrived — start drawing
                    M.scribbleWalking = false;
                    M.scribbleTarget = null;
                    M.penDown = true;
                    addJigglyScribbleAtCurrentSpot();
                    setTimeout(() => {
                        if (M.scribbling) {
                            M.penDown = false;
                            scheduleJigglyScribbleLoop(80);
                        }
                    }, 900);
                }
            } else if (M.scribbling && !M.penDown && !M.scribbleTarget) {
                scheduleJigglyScribbleLoop(80);
            }
        }
        function updateKetchup() {
            if (!ketchup) return;
            ketchup.x += ketchup.vx;
            ketchup.life--;
            if (ketchup.life <= 0 || ketchup.x < -40 || ketchup.x > sw + 40)
                ketchup = null;
            const dx = ketchup ? ketchup.x - petCenterX() : 999,
                dy = ketchup ? ketchup.y - petCenterY() : 999;
            if (ketchup && Math.sqrt(dx * dx + dy * dy) < 40) {
                ketchup = null;
                showBubble("KETCHUP!! ⚡ pika!");
                spawnP("star", 5);
                pikachuFace = "happy";
                pikachuFaceTimer = 100;
            }
        }

        // ═══════════════════════════════════════════
        // MAIN LOOP
        // ═══════════════════════════════════════════
        function update() {
            tick++;
            const now = performance.now();
            const dt = Math.min(0.05, (now - lastFrame) / 1000);
            lastFrame = now;
            C.clearRect(0, 0, 220, 220);
            M.breathPhase += 0.04;
            // Happy bounce — extra body bob
            const bounceMod = M.bouncing
                ? Math.abs(Math.sin(tick * 0.25)) * 6
                : 0;
            M.tailAngle =
                Math.sin(tick * (M.howling ? 0.12 : 0.035) * 28) *
                (M.sleeping ? 0.18 : 0.55) +
                0.38;
            if (--M.blinkTimer <= 0) {
                M.eyeOpen = !M.eyeOpen;
                M.blinkTimer = M.eyeOpen ? 90 + Math.random() * 120 : 7;
            }
            if (M.jumping) {
                M.jumpY += M.jumpVY;
                M.jumpVY += 0.85;
                if (M.jumpY <= 0) {
                    M.jumpY = 0;
                    M.jumping = false;
                    M.jumpVY = 0;
                }
            }
            if (M.purrTimer > 0 && --M.purrTimer === 0) M.purring = false;
            if (M.scratchTimer > 0 && --M.scratchTimer === 0)
                M.scratching = false;
            if (M.yawnTimer > 0 && --M.yawnTimer === 0) M.yawning = false;
            if (M.eatTimer > 0) M.eatTimer--;
            if (M.howlTimer > 0) {
                M.howlTimer--;
                if (M.howlTimer === 0) M.howling = false;
            }
            if (M.hissTimer > 0) {
                M.hissTimer--;
                if (M.hissTimer === 0) M.hissing = false;
            }
            if (M.singTimer > 0) {
                M.singTimer--;
                if (M.singTimer === 0) M.singing = false;
                else if (tick % 12 === 0) spawnMusicNote();
            }
            // angryTimer removed — angry state now controlled by M key hold/release
            if (M.thunderTimer > 0) {
                M.thunderTimer--;
                if (M.thunderTimer === 0) M.thundering = false;
            }
            if (pikachuFaceTimer > 0) pikachuFaceTimer--;

            // LLM animation timers
            if (llmThinking) thinkTimer++;
            if (M.bounceTimer > 0) {
                M.bounceTimer--;
                if (M.bounceTimer === 0) M.bouncing = false;
            }
            if (M.droopTimer > 0) {
                M.droopTimer--;
                if (M.droopTimer === 0) M.drooping = false;
            }
            if (M.llmJumpTimer > 0) M.llmJumpTimer--;
            if (M.personMoodTimer > 0) {
                M.personMoodTimer--;
                if (
                    M.personMoodTimer === 0 &&
                    (M.mood === "complain" ||
                        M.mood === "need_attention" ||
                        M.mood === "moody_stare")
                ) {
                    M.mood = "idle";
                }
            }

            // Auto-reaction timer
            if (!M.inGame) {
                autoReactTimer--;
                if (M.mood === "idle" || M.mood === "walk") idleTimer++;
                else idleTimer = 0;
                // Trigger if idle for a while or when the random autonomous timer fires
                if (
                    (idleTimer > 600 && tick - lastAutoReact > 800) ||
                    autoReactTimer <= 0
                ) {
                    autoReactTimer =
                        1400 + Math.floor(Math.random() * 1400);
                    lastAutoReact = tick;
                    idleTimer = 0;
                    if (canAutonomouslyAct()) triggerAutonomousAI();
                }
            }

            // Person image alternation timer
            if (currentPet === "person") {
                personImageTimer--;
                if (personImageTimer <= 0) {
                    personImageTimer = 3 * 60; // Matches the 3-second reset
                    personCurrentImage = personCurrentImage === 0 ? 1 : 0; // Switch between 0 and 1
                }
            }

            updateMiniGame(dt);
            updateMovement();
            updateBugs();
            updateHumans();
            updateBone();
            updateYarnBalls();
            updateRainbow();
            updateMusicNotes();
            updateLightnings();
            updateScribbles();
            updateKetchup();
            updatePixelMouse();
            updateMug();
            updateCupcake();
            if (orbitActive) updateOrbit();

            if (tick % 300 === 0) {
                M.happiness = Math.max(0, M.happiness - 2);
                M.hunger = Math.max(0, M.hunger - 1.5);
                M.energy = Math.max(0, M.energy - 1);
            }

            const cx = 110,
                cy = 130;
            if (currentPet === "cat") {
                drawCat(cx, cy);
            } else if (currentPet === "dog") {
                drawDog(cx, cy);
            } else if (currentPet === "lizard") drawLizard(cx, cy);
            else if (currentPet === "snake") drawSnake(cx, cy);
            else if (currentPet === "unicorn") {
                drawUnicorn(cx, cy);
            } else if (currentPet === "jigglypuff") drawJigglypuff(cx, cy);
            else if (currentPet === "pikachu") drawPikachu(cx, cy);
            else if (currentPet === "person") drawPerson(cx, cy);

            drawParticles();

            // ── LLM THINKING DOTS (drawn over everything in pet canvas) ──────────────
            if (llmThinking) {
                const dotY = 18;
                const dotX = 110;
                const phase = thinkTimer * 0.12;
                [0, 1, 2].forEach((i) => {
                    const y =
                        dotY - Math.abs(Math.sin(phase + i * 0.7)) * 8;
                    C.beginPath();
                    C.arc(dotX - 10 + i * 10, y, 3.5, 0, Math.PI * 2);
                    C.fillStyle = `rgba(180,140,255,${0.5 + Math.abs(Math.sin(phase + i * 0.7)) * 0.5})`;
                    C.fill();
                });
                // Question marks floating up
                if (thinkTimer % 40 === 0) {
                    particles.push({
                        type: "text",
                        ch: ["?", "...", "~", "?!"][
                            Math.floor(Math.random() * 4)
                        ],
                        x: 90 + Math.random() * 40,
                        y: 60,
                        vx: (Math.random() - 0.5) * 1,
                        vy: -0.8,
                        life: 50,
                        maxLife: 50,
                        size: 12,
                    });
                }
            }

            // ── SAD DROOP overlay ──────────────────────────────────────────────────────
            if (M.drooping) {
                const alpha = Math.min(1, M.droopTimer / 60) * 0.3;
                C.globalAlpha = alpha;
                // Blue tint over pet
                C.fillStyle = "rgba(100,150,255,0.15)";
                C.fillRect(60, 40, 100, 140);
                // Tear drops
                if (thinkTimer % 20 === 0 && M.droopTimer > 60) {
                    particles.push({
                        type: "tear",
                        x: 95 + Math.random() * 30,
                        y: 90,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: 1.5,
                        life: 40,
                        maxLife: 40,
                        size: 4,
                    });
                }
                C.globalAlpha = 1;
            }

            // Send scribbles + lightning + rainbow to fullscreen overlay every frame
            sendOverlay();

            requestAnimationFrame(update);
        }

        refreshScreen().then(() => {
            moveWin(sw / 2 - PET_ANCHOR_X, sh - PET_ANCHOR_Y);
        });
        update();
    </script>
</body>

</html>
